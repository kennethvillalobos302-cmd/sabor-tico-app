services:
  wyze-bridge:
    container_name: wyze-bridge
    image: idisposablegithub365/wyze-bridge:latest
    restart: unless-stopped
    ports:
      - 8554:8554   # RTSP (lo usa el grabador)
      - 8888:8888   # HLS
      - 8889:8889   # WebRTC
      - 1984:1984   # go2rtc (paginas de video para la app)
      - 8189:8189/udp
      - 5000:5080   # Panel web: http://localhost:5000
    environment:
      - WYZE_EMAIL=${WYZE_EMAIL}
      - WYZE_PASSWORD=${WYZE_PASSWORD}
      - WYZE_API_ID=${API_ID}
      - WYZE_API_KEY=${API_KEY}
      - BRIDGE_IP=${WB_IP}
      - BRIDGE_AUTH=false
      - MODEL_OVERRIDES=HL_CAM4:is_webrtc=true
      - TZ=America/Costa_Rica

  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "256mb"
    depends_on:
      - wyze-bridge
    ports:
      - 5001:5000   # Grabaciones: http://localhost:5001
      - 8971:8971
    volumes:
      - ./frigate-config:/config
      - ${GRABACIONES_DIR:-./grabaciones}:/media/frigate
    environment:
      - TZ=America/Costa_Rica
