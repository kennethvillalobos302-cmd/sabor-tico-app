services:
  wyze-bridge:
    container_name: wyze-bridge
    image: idisposablegithub365/wyze-bridge:latest
    restart: unless-stopped
    ports:
      - 8554:8554   # RTSP (lo usa el grabador)
      - 8888:8888   # HLS
      - 8889:8889   # WebRTC
      - 1984:1984   # go2rtc (paginas de video para la app)
      - 8189:8189/udp
      - 5000:5080   # Panel web: http://localhost:5000
    environment:
      - WYZE_EMAIL=${WYZE_EMAIL}
      - WYZE_PASSWORD=${WYZE_PASSWORD}
      - WYZE_API_ID=${API_ID}
      - WYZE_API_KEY=${API_KEY}
      - BRIDGE_IP=${WB_IP}
      - BRIDGE_AUTH=false
      - MODEL_OVERRIDES=HL_CAM4:is_webrtc=true
      - TZ=America/Costa_Rica

  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "256mb"
    depends_on:
      - wyze-bridge
    ports:
      - 5001:5000   # Grabaciones: http://localhost:5001
      - 8971:8971
    volumes:
      - ./frigate-config:/config
      - ${GRABACIONES_DIR:-./grabaciones}:/media/frigate
    environment:
      - TZ=America/Costa_Rica

  # Túneles gratuitos de Cloudflare: dan una dirección https pública a las
  # cámaras y a las grabaciones (sin cuentas, sin VPN, sin abrir el router)
  cloudflared-cams:
    container_name: cloudflared-cams
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://wyze-bridge:1984 --metrics 0.0.0.0:2000
    depends_on:
      - wyze-bridge

  cloudflared-rec:
    container_name: cloudflared-rec
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://frigate:5000 --metrics 0.0.0.0:2000
    depends_on:
      - frigate

  # Sincronizador: escribe las cámaras en la nube de la app → aparecen SOLAS
  # en la sección Cámaras de sabortico.app (aunque el túnel cambie de URL)
  camsync:
    container_name: camsync
    image: node:20-alpine
    restart: unless-stopped
    command: node /camsync.mjs
    volumes:
      - ./camsync.mjs:/camsync.mjs:ro
    environment:
      - FB_API_KEY=AIzaSyBxTfROnQBLvMBPuhnHTNjJKn1CmrI6im0
      - FB_DB_URL=https://sabor-tico-app-default-rtdb.firebaseio.com
    depends_on:
      - cloudflared-cams
      - cloudflared-rec
