<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141010">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sabor Tico">
<title>Sabor Tico App</title>
<style>
/* =====================================================================
   SABOR TICO — sistema visual (redesign-preserve, principios taste/impeccable)
   Marca Helo: acento púrpura bloqueado · tipografía de sistema (feel nativo)
   ===================================================================== */
:root{
  /* radios — un solo sistema de forma */
  --r-lg:16px;   /* superficies grandes: paneles, modales, cards */
  --r-md:11px;   /* botones, inputs, chips */
  --r-sm:8px;    /* compactos */
  --r-pill:999px;
  /* easing + duraciones */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --t-fast:.14s; --t-med:.24s;
  /* espaciado base 4 */
  --sp:4px;
}
:root,:root[data-theme="dark"]{color-scheme:dark}
:root[data-theme="light"]{color-scheme:light}
:root[data-theme="dark"]{
  --bg:#141010;
  --bg-elev:#1b1514;
  --bg-card:#211917;
  --bg-soft:#2b211e;
  --bg-row:#2b211e00;
  --border:#3a2d29;
  --border-soft:#2a201d;
  --text:#f4efed;
  --text-soft:#c7bab4;
  --text-dim:#9b8c85;
  --accent:#b83a52;
  --accent-2:#8f2438;
  --accent-press:#7a1f30;
  --accent-soft:rgba(184,58,82,.16);
  --accent-line:rgba(184,58,82,.42);
  --success:#5aa777; --success-bg:rgba(90,167,119,.14);
  --danger:#d9534f;  --danger-bg:rgba(217,83,79,.15);
  --warn:#d59b4a;    --warn-bg:rgba(213,155,74,.15);
  --info:#7fa9b8;    --info-bg:rgba(127,169,184,.15);
  /* elevación — sombras neutras a oscuro */
  --e1:0 1px 2px rgba(0,0,0,.4);
  --e2:0 6px 18px -6px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.35);
  --e3:0 24px 60px -12px rgba(0,0,0,.7), 0 8px 24px rgba(0,0,0,.45);
  --ring:0 0 0 3px var(--accent-soft);
  --grad-accent:linear-gradient(135deg,#a83048,#7c1f33);
}
:root[data-theme="light"]{
  --bg:#f4f1ef;
  --bg-elev:#ffffff;
  --bg-card:#ffffff;
  --bg-soft:#efe8e5;
  --bg-row:#f3edea;
  --border:#e2d8d4;
  --border-soft:#ede6e2;
  --text:#241a18;
  --text-soft:#574a44;
  --text-dim:#84756e;
  --accent:#8f2438;
  --accent-2:#7c1f33;
  --accent-press:#6a1a2b;
  --accent-soft:rgba(143,36,56,.10);
  --accent-line:rgba(143,36,56,.30);
  --success:#3f7d57; --success-bg:rgba(63,125,87,.10);
  --danger:#c0392b;  --danger-bg:rgba(192,57,43,.10);
  --warn:#b3792b;    --warn-bg:rgba(179,121,43,.12);
  --info:#4a7c8c;    --info-bg:rgba(74,124,140,.12);
  /* elevación — sombra tintada fría sobre claro */
  --e1:0 1px 2px rgba(40,46,66,.07);
  --e2:0 8px 20px -8px rgba(40,46,66,.16), 0 2px 6px rgba(40,46,66,.07);
  --e3:0 24px 50px -14px rgba(40,46,66,.22), 0 8px 20px rgba(40,46,66,.10);
  --ring:0 0 0 3px var(--accent-soft);
  --grad-accent:linear-gradient(135deg,#7355ff,#6240ff);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text);
  font-size:14.5px; line-height:1.55; letter-spacing:.1px;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14.5px}
:focus-visible{outline:none;box-shadow:var(--ring);border-radius:var(--r-sm)}
::selection{background:var(--accent-soft)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-soft);border:2px solid var(--bg);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--border)}
.hidden{display:none!important}
/* iconos SVG (sin emojis) */
.icon{width:18px;height:18px;display:inline-block;vertical-align:-3px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.icon-sm{width:14px;height:14px;stroke-width:2.1}
.icon-lg{width:22px;height:22px}
.av .icon{stroke:#fff;width:17px;height:17px}

/* ---------- motion (motivado, con reduced-motion) ---------- */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(120%)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: no-preference){
  .view{animation:fadeUp .3s var(--ease-out) both}
  .tk,.kpi,.card,.bcard{animation:fadeUp .32s var(--ease-out) both}
  .tk:nth-child(2){animation-delay:.03s}.tk:nth-child(3){animation-delay:.06s}
  .tk:nth-child(4){animation-delay:.09s}.tk:nth-child(5){animation-delay:.12s}
  .kpi:nth-child(2){animation-delay:.04s}.kpi:nth-child(3){animation-delay:.08s}.kpi:nth-child(4){animation-delay:.12s}
  .modal{animation:pop .2s var(--ease-out) both}
}

/* ---------- LOGIN ---------- */
.login-screen{position:fixed;inset:0;display:flex;justify-content:center;overflow-y:auto;
  background:
    radial-gradient(900px 480px at 50% -8%, var(--accent-soft), transparent 70%),
    radial-gradient(600px 400px at 100% 110%, var(--accent-soft), transparent 70%),
    var(--bg);
  z-index:50;padding:24px 20px}
.login-card{width:100%;max-width:430px;margin:auto;background:var(--bg-card);border:1px solid var(--border);
  border-radius:calc(var(--r-lg) + 6px);box-shadow:var(--e3);padding:28px 26px;animation:pop .35s var(--ease-out) both}
.login-logo{font-size:32px;font-weight:800;letter-spacing:-.8px;text-align:center}
.login-logo .dot{color:var(--accent)}
.login-tag{text-align:center;color:var(--text-soft);font-size:12px;margin-top:6px;margin-bottom:24px;
  text-transform:uppercase;letter-spacing:1.4px}
.login-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;color:var(--text-soft);margin-bottom:9px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:244px;overflow-y:auto;overflow-x:hidden;margin-bottom:18px;padding:2px;scrollbar-gutter:stable}
.lg-group{grid-column:1/-1;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);padding:9px 2px 2px}
.lg-group:first-child{padding-top:2px}
/* En computadora: login más ancho y 3 columnas de personas (compacto para que entre en pantalla) */
@media(min-width:781px){
  .login-card{max-width:540px;padding:28px 30px}
  .user-grid{grid-template-columns:1fr 1fr 1fr;max-height:266px}
}
.user-pick{min-width:0}
.user-pick>div{min-width:0}
.user-pick .nm,.user-pick .rl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-pick{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r-md);
  background:var(--bg-soft);text-align:left;transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast)}
.user-pick:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.user-pick.sel{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent-line)}
.user-pick .nm{font-weight:650;font-size:13px}
.user-pick .rl{font-size:11px;color:var(--text-soft)}
.pin-row{display:flex;gap:8px;margin-bottom:16px;width:100%}
.pin-row input{flex:1 1 0;min-width:0;width:100%;padding:14px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);
  color:var(--text);text-align:center;letter-spacing:6px;font-size:18px;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.pin-row input::placeholder{letter-spacing:6px}
.pin-row input:focus{border-color:var(--accent);box-shadow:var(--ring)}
#loginArea{width:100%}
#loginBtn{width:100%;max-width:100%}
.btn{padding:12px 16px;border-radius:var(--r-md);font-weight:650;font-size:14px;letter-spacing:.2px;
  transition:transform var(--t-fast),background var(--t-fast),border-color var(--t-fast),filter var(--t-fast),box-shadow var(--t-fast)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-primary{background:var(--grad-accent);color:#fff;box-shadow:0 6px 16px -6px var(--accent-2)}
#loginBtn{width:100%}
.btn-primary:hover{filter:brightness(1.06);box-shadow:0 10px 22px -8px var(--accent-2)}
.btn-primary:active{background:var(--accent-press)}
.btn-ghost{background:var(--bg-soft);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent-line);background:var(--bg-elev)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.05)}
.login-hint{font-size:11.5px;color:var(--text-soft);text-align:center;margin-top:16px;line-height:1.6}
.login-remember{display:flex;align-items:center;gap:10px;margin:-2px 0 16px;padding:11px 13px;border:1px solid var(--border);
  border-radius:var(--r-md);background:var(--bg-soft);cursor:pointer;user-select:none;transition:border-color var(--t-fast),background var(--t-fast)}
.login-remember:hover{border-color:var(--accent-line)}
.login-remember input{width:20px;height:20px;flex:0 0 auto;accent-color:var(--accent);cursor:pointer}
.login-remember .lr-txt{display:flex;flex-direction:column;gap:1px;min-width:0}
.login-remember .lr-t{font-size:13px;font-weight:650;color:var(--text)}
.login-remember .lr-d{font-size:11px;color:var(--text-soft);line-height:1.35}
.suc-pick{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.suc-card{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-weight:650;font-size:15px;text-align:left;transition:border-color var(--t-fast),transform var(--t-fast)}
.suc-card:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.suc-card .icon{color:var(--accent)}
.login-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-soft);font-size:12.5px;font-weight:600;padding:4px 0;margin-bottom:10px;cursor:pointer}
.login-back:hover{color:var(--text)}

/* ---------- AVATAR ---------- */
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}

/* ---------- APP SHELL ---------- */
.app{display:none;flex-direction:column}
/* La app cubre EXACTAMENTE toda la pantalla (incluye notch y home indicator con viewport-fit=cover),
   así la barra inferior llega al borde de abajo y nada queda "subido". */
.app.on{display:flex;position:fixed;inset:0}
.topbar{display:flex;align-items:center;gap:12px;padding:calc(11px + env(safe-area-inset-top)) 18px 11px;border-bottom:1px solid var(--border-soft);
  background:color-mix(in srgb,var(--bg-elev) 88%, transparent);backdrop-filter:blur(10px);flex-shrink:0;z-index:20}
.tb-logo{font-size:18px;font-weight:800;letter-spacing:-.4px;white-space:nowrap}
.tb-logo .dot{color:var(--accent)}
.cloud-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--success);background:var(--success-bg);padding:4px 9px;border-radius:var(--r-pill)}
.cloud-tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--success)}
.cloud-tag.off{color:var(--text-soft);background:var(--bg-soft)}
.cloud-tag.off::before{background:var(--text-soft)}
@media(max-width:780px){ .cloud-tag{display:none} }
.suc-switch{position:relative;display:flex;align-items:center;gap:7px;background:var(--bg-soft);border:1px solid var(--border);
  border-radius:var(--r-md);padding:7px 11px;font-size:13px;font-weight:650;transition:border-color var(--t-fast)}
.suc-switch:hover{border-color:var(--accent-line)}
.suc-switch>.icon{color:var(--text-soft);flex:0 0 auto}
.suc-btn{display:flex;align-items:center;gap:8px;background:transparent;border:none;color:var(--text);font-weight:650;font-size:13px;cursor:pointer;white-space:nowrap;outline:none}
.suc-btn[disabled]{cursor:default}
.suc-chev{color:var(--text-soft);transition:transform var(--t-fast)}
.suc-switch.open .suc-chev{transform:rotate(180deg)}
.suc-menu{position:absolute;top:calc(100% + 7px);left:0;min-width:230px;max-width:300px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r-md);box-shadow:var(--e3);padding:6px;z-index:60;display:none;animation:pop .14s var(--ease-out) both}
.suc-switch.open .suc-menu{display:block}
.suc-opt{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:10px 11px;border-radius:var(--r-sm);
  background:transparent;color:var(--text);font-size:13.5px;font-weight:600;cursor:pointer;transition:background var(--t-fast)}
.suc-opt:hover{background:var(--bg-soft)}
.suc-opt.on{background:var(--accent-soft);color:var(--accent)}
.suc-opt>.icon{color:var(--text-soft);flex:0 0 auto}
.suc-opt.on>.icon{color:var(--accent)}
.suc-opt .suc-check{margin-left:auto;opacity:0}
.suc-opt.on .suc-check{opacity:1;color:var(--accent)}
/* opciones oscuras en los select nativos del resto de la app */
select option,select optgroup{background:var(--bg-elev);color:var(--text)}
/* reservas: alinear Fecha y Hora a la misma altura/tamaño */
.rv-when{align-items:start}
.rv-when .datepick{width:100%}
.rv-when .datepick-btn{height:52px;box-sizing:border-box}
.rv-when .tp{display:flex;width:100%;height:52px;box-sizing:border-box;justify-content:flex-start;align-items:center;flex-wrap:nowrap;gap:2px 5px;padding:0 12px;overflow:hidden}
.rv-when .tp .tp-num{font-size:19px;padding:0 1px;width:2.3ch;min-width:2.3ch}
.rv-when .tp .tp-colon{font-size:17px}
.rv-when .tp .tp-ampm{margin-left:auto}
.rv-when .tp .tp-ap{padding:7px 11px;font-size:12px}
/* reservas: Personas (stepper) y Teléfono a la misma altura y proporción */
.rv-pt{align-items:start}
.rv-pt .qty-step{gap:8px}
.rv-pt .qty-step button{width:52px;height:52px;flex:0 0 52px;font-size:22px}
.rv-pt .qty-step input{height:52px;flex:1;min-width:0;font-size:20px}
.rv-pt .input{height:52px}
.tb-spacer{flex:1}
.icon-btn{width:39px;height:39px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
  background:var(--bg-soft);border:1px solid var(--border);position:relative;font-size:18px;
  transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast)}
.icon-btn:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
  background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px var(--bg-elev)}
.tb-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:4px 9px 4px 4px;border-radius:var(--r-md);
  transition:background var(--t-fast)}
.tb-user:hover{background:var(--bg-soft)}
.tb-user .nm{font-size:13px;font-weight:650;line-height:1.15}
.tb-user .rl{font-size:11px;color:var(--text-soft)}

.body-wrap{display:flex;flex:1;min-height:0}
.sidebar{width:218px;border-right:1px solid var(--border-soft);background:var(--bg-elev);
  padding:14px 12px;overflow-y:auto;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-md);
  font-weight:550;font-size:14px;color:var(--text-soft);margin-bottom:2px;width:100%;text-align:left;position:relative;
  transition:background var(--t-fast),color var(--t-fast)}
.nav-item .ico{font-size:18px;width:22px;text-align:center;transition:transform var(--t-fast)}
.nav-item:hover{background:var(--bg-soft);color:var(--text)}
.nav-item:hover .ico{transform:scale(1.08)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-item .ncount{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:9px;
  min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nav-sep{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-dim);font-weight:700;padding:16px 12px 7px}

.main{flex:1;overflow-y:auto;padding:26px 28px;min-width:0}
.view{max-width:1120px;margin:0 auto}
.view.view-wide{max-width:1600px}
.bottom-nav{display:none}

/* ---------- HEADINGS / SECTIONS ---------- */
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1.15}
.page-sub{color:var(--text-soft);font-size:13px;margin-top:3px}
.ph-spacer{flex:1}
.section-guide{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);margin-bottom:18px;overflow:hidden;box-shadow:var(--e1)}
.sg-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:13px 16px;font-size:14px;font-weight:650;color:var(--text);transition:background var(--t-fast)}
.sg-toggle:hover{background:var(--bg-soft)}
.sg-toggle .chev{margin-left:auto;transition:transform var(--t-med);color:var(--text-soft)}
.section-guide.open .chev{transform:rotate(180deg)}
.sg-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--t-med) var(--ease)}
.section-guide.open .sg-body{grid-template-rows:1fr}
.sg-inner{overflow:hidden;min-height:0}
.sg-inner>div{padding:2px 16px 16px;color:var(--text-soft);font-size:13px;line-height:1.65}
.sg-inner b{color:var(--text)}
.sg-inner ul{margin-top:8px}
.tip{background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-md);padding:10px 13px;margin-top:12px;font-size:12.5px;color:var(--text)}

/* ---------- KPI ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:17px 18px;
  box-shadow:var(--e1);transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast);position:relative;overflow:hidden}
.kpi:hover{transform:translateY(-2px);border-color:var(--border);box-shadow:var(--e2)}
.kpi .label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.1px;font-weight:700;color:var(--text-soft)}
.kpi .value{font-size:30px;font-weight:800;margin-top:8px;line-height:1;letter-spacing:-1px;
  font-variant-numeric:tabular-nums}
.kpi .sub{font-size:12px;color:var(--text-soft);margin-top:7px}
.kpi.alert .value{color:var(--danger)}
.kpi.good .value{color:var(--success)}
.kpi.warn .value{color:var(--warn)}

/* ---------- CARDS / LIST ---------- */
.card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:var(--e1)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.input,.select,.textarea{width:100%;padding:11px 13px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);
  color:var(--text);outline:none;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.input::placeholder,.textarea::placeholder{color:var(--text-dim)}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:var(--ring)}
.textarea{resize:vertical;min-height:84px;line-height:1.55}
.search{flex:1;min-width:160px}
.chip{padding:8px 13px;border-radius:var(--r-pill);background:var(--bg-soft);border:1px solid var(--border);
  font-size:12.5px;font-weight:650;color:var(--text-soft);white-space:nowrap;
  transition:border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.chip:hover{border-color:var(--accent-line);color:var(--text)}
.chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

.tk{display:flex;gap:13px;padding:14px 15px;border:1px solid var(--border-soft);border-radius:var(--r-lg);background:var(--bg-card);
  margin-bottom:10px;align-items:stretch;box-shadow:var(--e1);
  transition:border-color var(--t-fast),transform var(--t-fast),box-shadow var(--t-fast);cursor:pointer}
.tk:hover{border-color:var(--border);transform:translateY(-1px);box-shadow:var(--e2)}
.tk-bar{width:4px;flex:0 0 4px;border-radius:4px;background:var(--text-dim);align-self:stretch}
.tk-prio-alta .tk-bar{background:var(--danger)}
.tk-prio-media .tk-bar{background:var(--warn)}
.tk-prio-baja .tk-bar{background:var(--text-dim)}
.tk-overdue{border-color:var(--danger-bg)}
.tk-main{flex:1;min-width:0}
.tk-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.tk-title{font-weight:700;font-size:14.5px;letter-spacing:-.1px;line-height:1.3}
.tk-title .icon{color:var(--text-soft);vertical-align:-2px}
.tk-meta{font-size:12px;color:var(--text-soft);display:flex;gap:13px;flex-wrap:wrap;align-items:center}
.tk-meta .icon{vertical-align:-2px}
.tk-prio-chip{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.tk-due-late{color:var(--danger);font-weight:700}
.tk-avs{display:inline-flex;align-items:center}
.tk-av{display:inline-flex;margin-left:-7px}
.tk-av:first-child{margin-left:0}
.tk-av .av{width:23px;height:23px;font-size:9px;border:2px solid var(--bg-card);box-shadow:none}
.tk-av.more{width:23px;height:23px;border-radius:50%;background:var(--bg-soft);color:var(--text-soft);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;border:2px solid var(--bg-card);margin-left:-7px}
.tk-desc{font-size:13px;color:var(--text-soft);margin-top:8px;line-height:1.5}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);white-space:nowrap;display:inline-flex;align-items:center;gap:4px;letter-spacing:.2px}
.pill.pendiente{background:var(--bg-soft);color:var(--text-soft)}
.pill.proceso{background:var(--info-bg);color:var(--info)}
.pill.hecha{background:var(--success-bg);color:var(--success)}
.pill.rechazada{background:var(--danger-bg);color:var(--danger)}
.pill.atrasada{background:var(--warn-bg);color:var(--warn)}
.pr-alta{color:var(--danger)} .pr-media{color:var(--warn)} .pr-baja{color:var(--text-soft)}
.dot-prio{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
/* prioridad segmentada + fechas rápidas (modal de tarea) */
.prio-seg{display:flex;gap:8px}
.prio-b{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 8px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-weight:700;font-size:13px;color:var(--text-soft);transition:border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.prio-b.on{border-color:var(--accent);background:var(--accent-soft);color:var(--text)}
.due-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.td-when{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.td-when-date{flex:1;min-width:170px}
.td-when-time{flex:0 0 auto}
.td-when-lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:7px}
.td-when .tp{padding:7px 10px}
/* pedidos: selector de área + chips */
.tk-qty{color:var(--text-soft);font-weight:600;font-size:13px}
.ped-area-chip{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.ped-area-chip .icon{color:var(--text-soft);vertical-align:-2px}
.ped-area-pick{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ped-area-b{display:flex;align-items:center;gap:12px;text-align:left;width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);transition:border-color var(--t-fast),background var(--t-fast)}
.ped-area-b:hover{border-color:var(--accent-line)}
.ped-area-b.on{border-color:var(--accent);background:var(--accent-soft)}
.ped-area-ic{width:38px;height:38px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--bg-card);color:var(--accent)}
.ped-area-b.on .ped-area-ic{background:var(--grad-accent);color:#fff}
.ped-area-ic .icon{width:18px;height:18px}
.ped-area-tx{display:flex;flex-direction:column;min-width:0}
.ped-area-n{font-weight:700;font-size:14px}
.ped-area-s{font-size:12px;color:var(--text-soft)}
.ped-hint{font-size:11.5px;color:var(--text-soft);margin-top:7px;line-height:1.5}
/* reservas: selector de estado */
.rv-status-seg{display:flex;gap:8px;flex-wrap:wrap}
.rv-st-b{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border:1px solid var(--border);border-radius:var(--r-pill);background:var(--bg-soft);font-weight:700;font-size:12.5px;color:var(--text-soft);transition:border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.rv-st-b:hover{border-color:var(--accent-line)}
.rv-st-b.on{border-color:var(--accent);background:var(--accent-soft);color:var(--text)}
/* recetas / menú */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.rec-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:15px 16px;box-shadow:var(--e1);cursor:pointer;transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast)}
.rec-card:hover{transform:translateY(-2px);border-color:var(--accent-line);box-shadow:var(--e2)}
.rec-head{display:flex;align-items:center;gap:11px}
.rec-ic{width:42px;height:42px;flex:0 0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--grad-accent);color:#fff}
.rec-ic .icon{width:21px;height:21px}
.rec-hmain{flex:1;min-width:0}
.rec-name{font-weight:750;font-size:15px;line-height:1.2;letter-spacing:-.1px}
.rec-cat{font-size:12px;color:var(--text-soft);margin-top:2px}
.rec-figs{display:flex;gap:8px;margin:13px 0 11px}
.rec-fig{flex:1;background:var(--bg-soft);border-radius:var(--r-md);padding:8px 10px;text-align:center}
.rec-fig-l{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);font-weight:700}
.rec-fig-v{display:block;font-size:14.5px;font-weight:800;margin-top:3px}
.rec-ings{font-size:12px;color:var(--text-soft);line-height:1.5;display:flex;align-items:flex-start;gap:5px}
.rec-ings .icon{flex:0 0 auto;margin-top:1px;color:var(--text-dim)}
.rec-cardfoot{margin-top:13px}
.rec-cardfoot .btn{width:100%}
/* detalle de receta: ingredientes + costo */
.rec-inglist{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.rec-ing{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md)}
.rec-ing-main{min-width:0}
.rec-ing-n{font-weight:650;font-size:13.5px}
.rec-ing-s{font-size:12px;color:var(--text-soft);margin-top:2px}
.rec-ing-stock{flex:0 0 auto;font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill)}
.rec-ing-stock.ok{background:var(--success-bg);color:var(--success)}
.rec-ing-stock.no{background:var(--danger-bg);color:var(--danger)}
.rec-cost{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:4px 14px;margin:6px 0 16px}
.rec-cost-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;font-size:13px;color:var(--text-soft)}
.rec-cost-row+.rec-cost-row{border-top:1px solid var(--border-soft)}
.rec-cost-row b{color:var(--text);font-size:14.5px}
.rec-prep-rinde{font-size:14px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px}
/* fila de ingrediente en el formulario */
.rec-ing-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.rec-ing-prod{flex:1;min-width:0}
.rec-ing-qty{flex:0 0 90px;text-align:center}
.rec-ing-unit{flex:0 0 auto;font-size:12px;color:var(--text-soft);min-width:30px}
.rec-ing-del{width:38px;height:38px;flex:0 0 auto;border:1px solid var(--border)}
.rec-ing-del:hover{border-color:var(--danger)}.rec-ing-del:hover .icon{color:var(--danger)}
@media(max-width:640px){ .rec-grid{grid-template-columns:1fr} }
/* selector de personas reutilizable */
.ppick{display:flex;flex-direction:column;gap:10px}
.pp-modes{display:flex;gap:6px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:4px}
.pp-mode{flex:1;border:none;background:transparent;color:var(--text-soft);font-size:12.5px;font-weight:700;padding:7px 10px;border-radius:calc(var(--r-md) - 4px);cursor:pointer;transition:background var(--t-fast),color var(--t-fast)}
.pp-mode.on{background:var(--grad-accent);color:#fff}
.ppick-search{display:flex;align-items:center;gap:8px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:0 12px;transition:border-color var(--t-fast)}
.ppick-search:focus-within{border-color:var(--accent);box-shadow:var(--ring)}
.ppick-search .icon{color:var(--text-soft);flex:0 0 auto}
.ppick-search input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;padding:11px 0}
.ppick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;max-height:300px;overflow:auto;padding:2px}
.pp{display:flex;align-items:center;gap:10px;text-align:left;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);cursor:pointer;transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast);min-width:0}
.pp:hover{border-color:var(--accent-line)}
.pp:active{transform:scale(.98)}
.pp.on{border-color:var(--accent);background:var(--accent-soft)}
.pp .av{width:32px;height:32px;font-size:12px;flex:0 0 auto;box-shadow:none}
.pp-tx{display:flex;flex-direction:column;min-width:0;flex:1}
.pp-nm{font-weight:650;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-rl{font-size:11px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-ck{flex:0 0 auto;color:var(--accent);opacity:0;transition:opacity var(--t-fast)}
.pp.on .pp-ck{opacity:1}
.pp>.icon{flex:0 0 auto;color:var(--text-soft)}
.pp-group{grid-column:1/-1;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);padding:8px 2px 2px}
.pp-group:first-child{padding-top:2px}
/* encabezado de departamento en tablas (Personal / Equipo) */
.tbl .grp-row td{background:var(--bg-elev);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);padding:9px 11px;border-bottom:1px solid var(--border)}
@media(max-width:560px){ .ppick-grid{grid-template-columns:1fr 1fr} }
@media(max-width:420px){ .ppick-grid{grid-template-columns:1fr} }
/* reportes: selector de mes */
.rep-month{display:inline-flex;align-items:center;gap:4px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:4px 6px;flex:0 0 auto}
.rep-month b{font-size:13.5px;font-weight:700;min-width:150px;text-align:center;text-transform:capitalize}
.rep-tbl-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;margin-bottom:14px}
.rep-tbl-title .icon{color:var(--accent)}
/* clientes: ranking + perfil */
.cl-rank{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--bg-soft);color:var(--text-soft);font-size:11.5px;font-weight:800}
.cl-rank.top{background:var(--grad-accent);color:#fff}
.cl-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.cl-av{width:54px;height:54px;border-radius:16px;font-size:19px;font-weight:800;color:#fff;flex:0 0 auto}
.cl-name{font-weight:800;font-size:18px;letter-spacing:-.3px}
.cl-type{font-size:12.5px;color:var(--text-soft);margin-top:2px}
.cl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);overflow:hidden;margin-bottom:16px}
.cl-stat{background:var(--bg-card);padding:13px 10px;text-align:center}
.cl-stat-v{font-size:22px;font-weight:800;line-height:1}
.cl-stat-stars{display:flex;justify-content:center}
.cl-stat-l{font-size:11px;color:var(--text-soft);margin-top:5px}
.cl-hist{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.cl-hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px;background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);cursor:pointer;transition:border-color var(--t-fast)}
.cl-hrow:hover{border-color:var(--accent-line)}
.cl-hrow-main{min-width:0}
.cl-hd{font-weight:650;font-size:13.5px;text-transform:capitalize}
.cl-hs{font-size:12px;color:var(--text-soft);margin-top:2px}

.empty{text-align:center;padding:52px 20px;color:var(--text-soft)}
.empty .em-ico{font-size:42px;margin-bottom:12px;opacity:.9}
.empty .em-t{font-size:16px;font-weight:700;color:var(--text);margin-bottom:7px;letter-spacing:-.2px}
.empty .em-d{font-size:13px;max-width:360px;margin:0 auto 18px;line-height:1.6}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(6,8,14,.72);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:calc(var(--r-lg) + 2px);box-shadow:var(--e3);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.modal.wide{max-width:760px}
.modal-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg-card);z-index:2}
.modal-head h3{font-size:18px;font-weight:750;letter-spacing:-.3px}
.modal-close{margin-left:auto;width:32px;height:32px;border-radius:var(--r-sm);font-size:20px;color:var(--text-soft);transition:background var(--t-fast),color var(--t-fast)}
.modal-close:hover{background:var(--bg-soft);color:var(--text)}
.modal-body{padding:22px}
.modal-foot{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--border-soft);position:sticky;bottom:0;background:var(--bg-card)}
.modal-foot .btn{flex:1}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);margin-bottom:7px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.assignee-pick{display:flex;flex-wrap:wrap;gap:7px}
.ap{display:flex;align-items:center;gap:6px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--r-pill);
  background:var(--bg-soft);font-size:12.5px;font-weight:600;transition:border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.ap:hover{border-color:var(--accent-line)}
.ap.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.img-prev{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.img-prev img{width:66px;height:66px;object-fit:cover;border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer}
input[type=file]{font-size:12.5px;color:var(--text-soft)}
input[type=file]::file-selector-button{padding:8px 12px;margin-right:10px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--bg-soft);color:var(--text);font-weight:600;cursor:pointer;transition:border-color var(--t-fast)}
input[type=file]::file-selector-button:hover{border-color:var(--accent-line)}

/* ---------- DETAIL / COMMENTS ---------- */
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.dm{background:var(--bg-soft);border-radius:var(--r-md);padding:11px 13px}
.dm .dl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);font-weight:700}
.dm .dv{font-weight:650;margin-top:4px;font-size:13.5px}
.log{border-left:2px solid var(--border);padding-left:15px;margin-top:6px}
.log-item{position:relative;padding:8px 0;font-size:12.5px;color:var(--text-soft);line-height:1.5}
.log-item::before{content:'';position:absolute;left:-20px;top:13px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.log-item b{color:var(--text)}
.comment{display:flex;gap:9px;margin-bottom:11px}
.comment .cbody{background:var(--bg-soft);border-radius:var(--r-md);padding:9px 13px;flex:1}
.comment .cname{font-size:12px;font-weight:700}
.comment .ctext{font-size:13px;margin-top:3px;line-height:1.5}
.comment .ctime{font-size:10.5px;color:var(--text-soft);margin-top:4px}
/* detalle de tarea (pop-up rediseñado) */
.td-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.td-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text-soft);background:var(--bg-soft);border-radius:var(--r-pill);padding:5px 11px}
.td-badge.tk-due-late{color:var(--danger);background:var(--danger-bg);font-weight:700}
.td-desc{font-size:14px;line-height:1.6;background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:13px 15px;margin-bottom:14px;white-space:pre-wrap}
.td-meta{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);overflow:hidden;margin-bottom:18px}
.td-mrow{background:var(--bg-card);padding:11px 14px;display:flex;flex-direction:column;gap:3px}
.td-ml{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--text-soft)}
.td-mv{font-size:13.5px;font-weight:650}
.td-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.td-sec{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);font-weight:700;margin:16px 0 9px}
.td-comments{display:flex;flex-direction:column;margin-bottom:6px}
.td-empty{color:var(--text-soft);font-size:13px;padding:4px 0}
.td-composer{display:flex;gap:9px;align-items:center;margin-top:6px}
.td-composer .input{flex:1}
@media(max-width:560px){ .td-meta{grid-template-columns:1fr} }

/* ---------- CHAT ---------- */
.chat-wrap{display:flex;gap:0;height:calc(100vh - 150px);border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;background:var(--bg-card);box-shadow:var(--e1)}
.chat-list{width:288px;border-right:1px solid var(--border-soft);overflow-y:auto;flex-shrink:0}
.chat-li{display:flex;gap:12px;align-items:center;padding:12px 15px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background var(--t-fast)}
.chat-li:hover{background:var(--bg-soft)}
.chat-li.sel{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.chat-li .av{width:46px;height:46px;flex:0 0 auto;font-size:17px}
.chat-li .cl-mid{min-width:0;flex:1;display:flex;flex-direction:column;gap:2px}
.chat-li .cn{font-weight:650;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-li .cl-grp{font-size:10px;color:var(--text-soft);font-weight:600}
.chat-li .cp{font-size:12.5px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-li .cl-end{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto}
.chat-li .cl-time{font-size:10.5px;color:var(--text-dim)}
.chat-li .cbadge{background:var(--accent);color:#fff;font-size:10px;font-weight:800;border-radius:10px;min-width:19px;height:19px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.chat-pane{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-head{padding:13px 17px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:11px;flex-shrink:0;background:var(--bg-elev)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:2px;
  background-color:var(--bg);background-image:radial-gradient(var(--border) .6px, transparent .6px);background-size:20px 20px}
.chat-day{align-self:center;margin:12px 0 8px;background:var(--bg-elev);color:var(--text-soft);font-size:11px;font-weight:700;
  padding:4px 13px;border-radius:var(--r-pill);box-shadow:var(--e1)}
.msg{position:relative;max-width:80%;padding:7px 11px 5px;border-radius:14px 14px 14px 5px;font-size:14px;background:var(--bg-elev);
  align-self:flex-start;word-wrap:break-word;overflow-wrap:anywhere;line-height:1.4;box-shadow:0 1px 1.5px rgba(0,0,0,.28);border:1px solid var(--border-soft)}
.chat-msgs .msg{margin-top:8px}
.chat-msgs .msg.grouped{margin-top:2px}
.msg.mine{background:var(--accent-2);color:#fff;align-self:flex-end;border:none;border-radius:14px 14px 5px 14px}
.msg .mname{font-size:11.5px;font-weight:750;color:var(--accent);margin-bottom:2px}
.msg.mine .mname{color:rgba(255,255,255,.92)}
.msg .mtext{white-space:pre-wrap}
.msg img,.msg video{max-width:100%;border-radius:10px;display:block;margin-top:4px}
.msg.media-only{padding:4px}
.msg.media-only .mtime{position:absolute;right:9px;bottom:9px;margin:0;background:rgba(0,0,0,.5);color:#fff;padding:1px 7px;border-radius:9px;opacity:1}
.msg .mtime{font-size:10px;opacity:.62;margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:3px}
.msg.mine .mtime{opacity:.82}
.msg .mtime .icon{width:13px;height:13px}
.msg-del{background:none;border:none;cursor:pointer;opacity:.4;padding:0 0 0 4px;color:inherit;display:inline-flex}
.msg-del:hover{opacity:1}
.msg-del .icon{width:12px;height:12px}
.chat-input{display:flex;gap:9px;padding:13px;border-top:1px solid var(--border-soft);flex-shrink:0;background:var(--bg-elev)}
.chat-input input{flex:1;padding:12px 15px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-pill);color:var(--text);outline:none;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.chat-input input:focus{border-color:var(--accent);box-shadow:var(--ring)}
.chat-send{width:45px;height:45px;border-radius:50%;background:var(--grad-accent);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--t-fast),filter var(--t-fast)}
.chat-send:hover{filter:brightness(1.07)}
.chat-send:active{transform:scale(.94)}
.chat-mic{width:44px;height:44px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);color:var(--text-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:border-color var(--t-fast),color var(--t-fast),background var(--t-fast)}
.chat-mic:hover{border-color:var(--accent-line);color:var(--accent)}
/* barra de grabación */
.chat-rec .rec-mid{flex:1;display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--bg-soft);border:1px solid var(--accent-line);border-radius:var(--r-pill);font-size:14px;font-weight:600;color:var(--text)}
.rec-dot{width:11px;height:11px;border-radius:50%;background:var(--danger);flex:0 0 auto;animation:cdpulse 1.4s infinite}
.rec-lbl{color:var(--text-soft);font-weight:500}
.chat-rec .rec-cancel:hover{border-color:var(--danger);color:var(--danger)}
/* reproductor de nota de voz */
.va-player{display:flex;align-items:center;gap:9px;min-width:200px;max-width:280px;padding:4px 4px 4px 4px}
.va-play{width:34px;height:34px;flex:0 0 auto;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.va-play .icon{width:16px;height:16px}
.msg.mine .va-play{background:#fff;color:var(--accent-2)}
.va-bar{flex:1;height:5px;border-radius:999px;background:var(--bg);cursor:pointer;min-width:60px;overflow:hidden}
.msg.mine .va-bar{background:rgba(255,255,255,.28)}
.va-fill{height:100%;width:0;background:var(--accent);border-radius:999px}
.msg.mine .va-fill{background:#fff}
.va-time{font-size:11.5px;font-weight:700;color:var(--text-soft);flex:0 0 auto;min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
.msg.mine .va-time{color:rgba(255,255,255,.9)}
.chat-pending .va-player{min-width:0;max-width:220px}
.admin-eye{font-size:11px;color:var(--warn);background:var(--warn-bg);padding:4px 9px;border-radius:var(--r-sm);font-weight:700;white-space:nowrap}
.chat-head-main{display:flex;align-items:center;gap:11px;min-width:0;border-radius:var(--r-md);padding:3px;margin:-3px}
.chat-head-main[style*=pointer]:hover{background:var(--bg-soft)}
/* info / gestión de grupo */
.gi-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.gi-av{width:54px;height:54px;border-radius:16px;font-size:22px;font-weight:800;color:#fff;flex:0 0 auto;text-transform:uppercase}
.gi-name{flex:1;font-size:16px;font-weight:700}
.gi-title{flex:1;font-size:19px;font-weight:800;letter-spacing:-.3px}
.gi-sec{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)}
.gi-list{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.gi-member{display:flex;align-items:center;gap:11px;padding:8px 4px;border-radius:var(--r-sm)}
.gi-member:hover{background:var(--bg-soft)}
.gi-m-main{flex:1;min-width:0}
.gi-m-name{font-weight:650;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.gi-m-sub{font-size:12px;color:var(--text-soft);margin-top:1px}
.gi-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft)}
.gi-actions .btn{flex:1;min-width:140px}

/* ---------- BOARD (proyectos) ---------- */
.board{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.bcard{width:232px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:13px;position:relative;box-shadow:var(--e1);transition:transform var(--t-fast),box-shadow var(--t-fast)}
.bcard:hover{transform:translateY(-2px);box-shadow:var(--e2)}
.bcard.note{background:linear-gradient(180deg,var(--warn-bg),transparent),var(--bg-card);border-color:var(--warn-bg)}
.bcard .bc-text{font-size:13px;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.bcard img{width:100%;border-radius:var(--r-md);margin-top:4px}
.bcard .bc-meta{font-size:10.5px;color:var(--text-soft);margin-top:9px}
.bcard .bc-del{position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:var(--r-sm);font-size:14px;color:var(--text-soft);opacity:0;transition:opacity var(--t-fast),background var(--t-fast)}
.bcard:hover .bc-del{opacity:1}
.bcard .bc-del:hover{background:var(--danger-bg);color:var(--danger)}
.proj-tab{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.member-av{display:flex;align-items:center}
.member-av .av{width:29px;height:29px;font-size:11px;border:2px solid var(--bg-card);margin-left:-9px;box-shadow:none}
.member-av .av:first-child{margin-left:0}
/* horario en inicio */
.sched-card{display:flex;align-items:center;gap:14px}
.sched-card.free{opacity:.92}
.sched-card .av{width:42px;height:42px}
.sched-row{display:flex;gap:13px;padding:13px;border:1px solid var(--border-soft);border-radius:var(--r-md);background:var(--bg-soft);margin-bottom:8px;align-items:flex-start}
.sched-row.mine{border-color:var(--accent-line);background:var(--accent-soft)}
.sched-row .tk-main{flex:1;min-width:0}
/* marcas de asistencia (entrada/salida en sesiones) */
.att-segs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.att-seg{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 11px;border-radius:var(--r-pill);background:var(--bg-soft);border:1px solid var(--border)}
.att-seg.open{border-color:var(--accent-line);color:var(--accent);background:var(--accent-soft)}
.att-arrow{opacity:.55}
.att-del{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;margin-left:4px;border:none;background:transparent;color:var(--danger);opacity:.6;cursor:pointer;border-radius:50%;flex:0 0 auto}
.att-del:hover{opacity:1;background:var(--danger-bg)}
.att-del .icon{width:11px;height:11px}
/* código de entrada rotativo (se muestra en el local) */
.entry-code-box{text-align:center;padding:20px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-lg);margin-top:6px}
.entry-code{font-size:clamp(44px,12vw,60px);font-weight:800;letter-spacing:10px;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.entry-count{height:6px;background:var(--bg);border-radius:999px;overflow:hidden;margin:16px 0 8px}
.entry-bar{height:100%;background:var(--grad-accent);width:100%;transition:width 1s linear}
.entry-sub{font-size:12.5px;color:var(--text-soft);font-weight:600}
.att-total{font-weight:800;white-space:nowrap;align-self:center;font-size:14px}
/* modal de turno (fácil) */
.sh-times{display:flex;align-items:flex-end;gap:10px;margin-bottom:8px}
.sh-time{flex:1}
.sh-time label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:7px}
.sh-time input{font-size:19px;font-weight:700;text-align:center;padding:13px;width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text)}
.sh-time input:focus{border-color:var(--accent);box-shadow:var(--ring);outline:none}
.sh-arrow{text-align:center;color:var(--text-soft);font-size:16px;font-weight:700;line-height:1;margin:-2px 0}
/* atajos de turno */
.sh-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sh-preset{flex:1 1 calc(50% - 4px);min-width:118px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-weight:700;font-size:13px;color:var(--text);text-align:left;transition:border-color var(--t-fast),background var(--t-fast)}
.sh-preset span{font-size:11px;font-weight:600;color:var(--text-soft)}
.sh-preset:hover{border-color:var(--accent-line)}
.sh-preset.on{border-color:var(--accent);background:var(--accent-soft)}
.sh-preset.on,.sh-preset.on span{color:var(--accent)}
/* cabecera/edición de turnos rápidos */
.sh-presetbox{margin-bottom:12px}
.pe-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.pe-head>span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft)}
.pe-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent);background:transparent;padding:5px 9px;border-radius:var(--r-sm);transition:background var(--t-fast)}
.pe-link:hover{background:var(--accent-soft)}
.pe-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.pe-name{flex:0 0 112px;font-weight:700;padding:11px 12px}
.pe-times{flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 12px;min-width:0}
.pe-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft)}
.pe-times .tp{background:transparent;border:none;border-radius:0;padding:3px 0;flex-wrap:nowrap}
.pe-times .tp:focus-within{box-shadow:none}
.pe-times .tp-num{font-size:18px}
/* bloque de horas Entra/Sale */
.sh-block{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.sh-block .sh-row{display:flex;align-items:center;gap:10px;padding:8px 16px;min-height:58px}
.sh-block .sh-row+.sh-row{border-top:1px solid var(--border-soft)}
.sh-block .sh-row>label{flex:0 0 54px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);margin:0}
.sh-block .tp{flex:1;background:transparent;border:none;border-radius:0;justify-content:flex-end;padding:4px 0;flex-wrap:nowrap;gap:2px 6px}
.sh-block .tp:focus-within{box-shadow:none}
.sh-block .tp-ampm{margin-left:8px}
.sh-preview{margin:2px 0 4px}
.ap.shpreset{padding:9px 13px;font-weight:600}
.ap.shpreset.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.brk-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
/* selector de hora AM/PM */
.tp{display:inline-flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:3px 4px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:6px 8px;overflow:visible;max-width:100%}
.tp select{background:transparent;border:none;color:var(--text);font-weight:800;font-size:19px;outline:none;cursor:pointer;padding:7px 2px;-webkit-appearance:none;appearance:none;text-align:center}
.tp-num{width:2.5ch;min-width:2.5ch;flex:0 0 auto;background:transparent;border:none;color:var(--text);font-weight:800;font-size:21px;outline:none;text-align:center;padding:6px 2px;caret-color:var(--accent)}
.tp-num::placeholder{color:var(--text-soft);opacity:.45}
.tp:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(184,58,82,.18)}
.tp .tp-colon{font-weight:800;color:var(--text-soft);font-size:18px;padding:0 1px}
.tp-ampm{display:inline-flex;flex:0 0 auto;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:4px}
.tp-ap{padding:8px 10px;font-size:12px;font-weight:700;color:var(--text-soft);background:transparent;border:none;cursor:pointer;transition:background var(--t-fast),color var(--t-fast)}
.tp-ap.on{background:var(--accent);color:#fff}
.sh-pickwrap{display:flex;flex-direction:column;align-items:stretch;gap:10px}
.sh-pickwrap .sh-time{display:flex;flex-direction:column;gap:7px}
.sh-pickwrap .tp{width:100%;justify-content:center}
.add-break{width:100%;border:1.5px dashed var(--border);background:transparent;border-radius:var(--r-md);padding:11px;font-weight:600;color:var(--text-soft);display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color var(--t-fast),color var(--t-fast)}
.add-break:hover{border-color:var(--accent);color:var(--accent)}
.btn-off{width:100%;border:1px solid var(--border);background:var(--bg-soft);border-radius:var(--r-md);padding:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color var(--t-fast)}
.btn-off:hover{border-color:var(--accent-line)}
/* calendario personalizado */
.datepick{position:relative}
.datepick-btn{display:flex;align-items:center;gap:8px;width:100%;cursor:pointer;text-align:left;font-weight:600}
.cal{position:absolute;z-index:5;top:calc(100% + 6px);left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--e3);padding:12px;animation:pop .15s var(--ease-out) both}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:700;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow div{text-align:center;font-size:10.5px;font-weight:700;color:var(--text-soft);padding:4px 0}
.cal-day{height:34px;border-radius:8px;font-size:13px;color:var(--text);background:transparent;border:none;cursor:pointer;transition:background var(--t-fast)}
.cal-day:hover{background:var(--bg-soft)}
.cal-day.today{box-shadow:inset 0 0 0 1px var(--accent-line)}
.cal-day.sel{background:var(--grad-accent);color:#fff;font-weight:700}
/* vista general de horarios (timeline) */
.hor-modes{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.hm-sep{width:1px;align-self:stretch;min-height:24px;background:var(--border);margin:0 3px;flex:0 0 auto}
/* ---- Horarios · Mi semana ---- */
.mw-sum{display:flex;align-items:center;gap:20px;background:var(--grad-accent);color:#fff;border-radius:var(--r-lg);padding:16px 22px;margin-bottom:14px;box-shadow:var(--e2)}
.mw-sum-cell{display:flex;flex-direction:column}
.mw-sum-big{font-size:24px;font-weight:800;line-height:1}
.mw-sum-lbl{font-size:11.5px;opacity:.88;margin-top:4px}
.mw-sum-div{width:1px;align-self:stretch;background:rgba(255,255,255,.28)}
.myweek{display:flex;flex-direction:column;gap:8px}
.mw-day{display:flex;gap:14px;padding:13px;border:1px solid var(--border-soft);border-radius:var(--r-md);background:var(--bg-card);align-items:flex-start;transition:border-color var(--t-fast) var(--ease)}
.mw-day.today{border-color:var(--accent-line);background:var(--accent-soft)}
.mw-day.isoff{opacity:.82}
.mw-date{flex:0 0 auto;width:54px;text-align:center;border-radius:var(--r-sm);background:var(--bg-soft);padding:9px 0;display:flex;flex-direction:column;gap:2px}
.mw-date.on{background:var(--grad-accent);color:#fff}
.mw-wd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft)}
.mw-date.on .mw-wd{color:rgba(255,255,255,.9)}
.mw-dn{font-size:21px;font-weight:800;line-height:1}
.mw-body{flex:1;min-width:0;padding-top:1px}
.mw-dayname{font-size:12px;font-weight:700;text-transform:capitalize;color:var(--text-soft);margin-bottom:6px}
.mw-shift+.mw-shift{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft)}
.mw-time{font-size:17px;font-weight:800;letter-spacing:.2px}
.mw-dash{color:var(--text-dim);font-weight:600;margin:0 2px}
.mw-meta{font-size:12px;color:var(--text-soft);margin-top:4px;display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center}
.mw-meta>span{display:inline-flex;align-items:center;gap:4px}
.mw-brks{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.mw-brk{font-size:11px;padding:3px 10px;border-radius:var(--r-pill);background:var(--bg-soft);color:var(--text-soft);display:inline-flex;align-items:center;gap:4px}
.mw-empty{font-size:13px;color:var(--text-dim);padding:5px 0}
.mw-pill.off{display:inline-block;font-size:12.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 14px;border-radius:var(--r-pill)}
/* ---- Horarios · Vista general (timeline) ---- */
.chip-dot{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin-left:6px;vertical-align:-3px;border-radius:var(--r-pill);background:var(--accent-soft);color:var(--accent);font-size:10.5px;font-weight:800}
.chip.on .chip-dot{background:rgba(255,255,255,.25);color:#fff}
.tl-summary{font-size:13px;color:var(--text-soft);margin-bottom:10px}
.tl-sum-num{font-weight:800;color:var(--text);font-size:15px}
.tl-wrap{overflow-x:auto;padding:16px}
.tl{min-width:600px}
.tl-axis{display:flex;margin-left:150px;height:20px;border-bottom:1px solid var(--border);margin-bottom:10px}
.tl-axis span{flex:1;font-size:10px;color:var(--text-soft);border-left:1px solid var(--border-soft);padding-left:4px}
.tl-dept{font-weight:800;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin:18px 0 8px}
.tl-row{display:flex;align-items:center;margin-bottom:8px}
.tl-name{width:150px;flex-shrink:0;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.tl-track{position:relative;flex:1;height:32px;background-color:var(--bg-soft);background-image:linear-gradient(90deg,var(--border) 0 1px,transparent 1px);background-size:var(--tl-step,9999px) 100%;border-radius:8px;overflow:hidden}
.tl-bar{position:absolute;top:3px;bottom:3px;background:var(--grad-accent);border-radius:6px;display:flex;align-items:center;min-width:3px;box-shadow:var(--e1);z-index:2}
.tl-lbl{font-size:10px;color:#fff;font-weight:700;padding:0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-brk{position:absolute;top:0;bottom:0;background:var(--bg);opacity:.5;border-left:1px dashed #fff;border-right:1px dashed #fff}
.tl-off{position:absolute;inset:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-soft);font-weight:600;border:1px dashed var(--border);border-radius:6px}
.tl-now{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:4;box-shadow:0 0 6px var(--accent)}
/* inventario rediseñado */
.inv-card{display:grid;grid-template-columns:96px 1fr auto;gap:16px;align-items:center;background:var(--bg-card);border:1px solid var(--border-soft);border-left:3px solid var(--success);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;box-shadow:var(--e1);transition:border-color var(--t-fast),transform var(--t-fast),box-shadow var(--t-fast)}
.inv-card:hover{transform:translateY(-1px);box-shadow:var(--e2)}
.inv-card.low{border-left-color:var(--danger)}
.inv-stock{text-align:center}
.inv-stock-n{font-size:23px;font-weight:800;line-height:1;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.inv-stock-n span{font-size:11px;font-weight:600;color:var(--text-soft);margin-left:3px}
.inv-bar{height:6px;background:var(--bg-soft);border-radius:4px;overflow:hidden;margin:7px 0 4px}
.inv-bar div{height:100%;background:var(--success);border-radius:4px;transition:width .4s var(--ease-out)}
.inv-card.low .inv-bar div{background:var(--danger)}
.inv-min{font-size:10.5px;color:var(--text-soft)}
.inv-info{min-width:0}
.inv-name{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:-.1px}
.inv-area{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);background:var(--bg-soft);padding:3px 7px;border-radius:6px}
.inv-meta{font-size:12.5px;color:var(--text-soft);margin-top:6px;line-height:1.5}
.inv-actions{display:flex;gap:6px;flex-shrink:0}
.ibtn{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-size:12.5px;font-weight:600;color:var(--text);transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast)}
.ibtn:hover{border-color:var(--accent-line)}
.ibtn:active{transform:scale(.97)}
.ibtn.ok:hover{border-color:var(--success)}
.ibtn .icon{color:var(--text-soft)}
.ibtn.ok .icon{color:var(--success)}
.ibtn.danger .icon{color:var(--danger)}
.ibtn.sale:hover{border-color:#a855f7}
.ibtn.sale .icon{color:#a855f7}
.ibtn.move:hover{border-color:var(--accent)}
.ibtn.move .icon{color:var(--accent)}
/* ---- inventario: lado (Cocina/Bar), bodega, familias ---- */
.inv-seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;background:var(--bg-soft)}
.inv-seg button{border:none;background:none;padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--text-soft);cursor:pointer;transition:background var(--t-fast),color var(--t-fast)}
.inv-seg button+button{border-left:1px solid var(--border)}
.inv-seg button:hover{color:var(--text)}
.inv-seg button.on{background:var(--accent);color:#fff}
.inv-bodega{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:999px;padding:1px 9px 1px 6px;margin-left:8px;vertical-align:middle}
.inv-bodega .icon{color:var(--accent)}
.inv-fam{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border-soft)}
.inv-fam:first-child{margin-top:2px}
.inv-fam-n{font-weight:600;color:var(--text-soft);text-transform:none;letter-spacing:0}
/* ===== Inventario · diseño de 3 paneles (familias | tarjetas | editor) ===== */
.iconbtn-sq{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;flex:0 0 auto;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);color:var(--text-soft);cursor:pointer;transition:border-color var(--t-fast),color var(--t-fast)}
.iconbtn-sq:hover{border-color:var(--accent-line);color:var(--text)}
.iconbtn-sq.danger:hover{border-color:var(--danger);color:var(--danger)}
.inv-shell{display:flex;gap:16px;align-items:flex-start}
/* --- menú izquierdo: familias --- */
.inv-side{flex:0 0 232px;position:sticky;top:8px;max-height:calc(100vh - 96px);display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:12px;box-shadow:var(--e1)}
.inv-side-h{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:800;color:var(--text);padding:2px 6px 10px}
.inv-side-h>span:first-child{display:inline-flex;align-items:center;gap:7px}
.inv-side-h .icon{color:var(--accent)}
.inv-side-count{font-size:11.5px;font-weight:700;color:var(--text-soft);background:var(--bg-soft);border-radius:999px;padding:2px 9px}
.inv-side-seg{margin:0 0 10px;width:100%}
.inv-side-seg button{flex:1;justify-content:center;display:inline-flex;align-items:center;gap:4px;padding:7px 4px}
.inv-fam-list{flex:1;overflow:auto;margin:0 -4px;padding:0 4px;display:flex;flex-direction:column;gap:2px}
.inv-fam-row{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:9px 10px;border-radius:var(--r-md);font-size:13px;font-weight:600;color:var(--text);transition:background var(--t-fast)}
.inv-fam-row:hover{background:var(--bg-soft)}
.inv-fam-row.on{background:var(--accent);color:#fff}
.inv-fam-row.on .inv-fam-c{color:#fff;background:rgba(255,255,255,.22)}
.inv-fam-row.on .icon{color:#fff}
.inv-fam-ico .icon{color:var(--text-soft)}
.inv-dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.inv-fam-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-fam-c{font-size:11.5px;font-weight:700;color:var(--text-soft);background:var(--bg-soft);border-radius:999px;padding:1px 8px;min-width:22px;text-align:center}
.inv-side-foot{display:flex;gap:7px;padding-top:10px;margin-top:8px;border-top:1px solid var(--border-soft)}
.inv-side-foot .input{padding:9px 11px;font-size:13px}
/* --- centro: tarjetas --- */
.inv-main{flex:1 1 auto;min-width:0}
.inv-main-h{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.inv-main-title{font-size:19px;font-weight:800;letter-spacing:-.3px;flex:0 0 auto}
.inv-main-n{font-size:13px;font-weight:700;color:var(--text-soft);background:var(--bg-soft);border-radius:999px;padding:2px 9px;margin-left:4px}
.inv-search-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:999px;padding:0 14px;max-width:420px;margin-left:auto}
.inv-search-wrap .icon{color:var(--text-soft);flex:0 0 auto}
.inv-search-wrap .input{border:none;background:none;padding:10px 0;flex:1}
.inv-search-wrap .input:focus{box-shadow:none}
.inv-new-btn{flex:0 0 auto}
.inv-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.inv-filters .select{max-width:180px}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.inv-tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:7px;min-height:150px;padding:18px 14px 14px;border:1px solid var(--border-soft);border-radius:var(--r-lg);background:var(--bg-card);cursor:pointer;box-shadow:var(--e1);transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast)}
.inv-tile::before{content:"";position:absolute;top:0;left:14px;right:14px;height:3px;border-radius:0 0 3px 3px;background:var(--fc,var(--accent))}
.inv-tile:hover{transform:translateY(-2px);box-shadow:var(--e2);border-color:var(--border)}
.inv-tile.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-line)}
.inv-tile.low{border-color:#f3c0c0}
.inv-tile.low::before{background:var(--danger)}
.inv-tile-top{position:absolute;top:8px;right:8px;left:8px;display:flex;align-items:center;justify-content:flex-end;gap:5px}
.inv-tile-eye{color:var(--text-dim);opacity:0;transition:opacity var(--t-fast)}
.inv-tile:hover .inv-tile-eye{opacity:.8}
.inv-tile-warn .icon,.inv-tile-warn{color:var(--danger)}
.inv-tile-name{font-size:14px;font-weight:700;line-height:1.25;color:var(--text);margin-top:6px}
.inv-tile-qty{font-size:23px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.inv-tile-qty i{font-size:12.5px;font-weight:600;color:var(--text-soft);font-style:normal;margin-left:3px}
.inv-tile-qty.low{color:var(--danger)}
.inv-tile-min{font-size:11px;color:var(--text-soft)}
.inv-tile-new{border-style:dashed;color:var(--text-soft);font-size:13px;font-weight:600;gap:6px;box-shadow:none}
.inv-tile-new::before{display:none}
.inv-tile-new:hover{color:var(--accent);border-color:var(--accent-line)}
.inv-tile-plus .icon{width:26px;height:26px;color:var(--text-soft)}
/* --- derecha: editor --- */
.inv-edit{flex:0 0 380px;position:sticky;top:8px;max-height:calc(100vh - 96px);display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);box-shadow:var(--e2);overflow:hidden}
.inv-edit-h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:16px 16px 12px;border-bottom:1px solid var(--border-soft)}
.inv-edit-kick{font-size:10.5px;font-weight:800;letter-spacing:1px;color:var(--text-soft);text-transform:uppercase}
.inv-edit-name{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-top:3px}
.inv-edit-body{flex:1;overflow:auto;padding:16px}
.inv-edit-body .ip-sec:first-child{padding-top:0}
.inv-edit-body textarea.input{resize:vertical;min-height:54px;font-family:inherit}
.inv-colors{display:flex;flex-wrap:wrap;gap:8px}
.inv-color{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0;transition:transform var(--t-fast)}
.inv-color:hover{transform:scale(1.1)}
.inv-color.on{box-shadow:0 0 0 2px var(--bg-card),0 0 0 4px var(--accent)}
.inv-color.none{background:repeating-conic-gradient(var(--bg-soft) 0% 25%,#fff 0% 50%) 50%/10px 10px}
.inv-edit-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inv-edit-actions .ibtn{justify-content:center}
.inv-edit-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-top:1px solid var(--border-soft);background:var(--bg-soft)}
.inv-edit-foot-r{display:flex;gap:8px}
/* familias: acciones al pasar el mouse (renombrar / eliminar) */
.inv-fam-acts{display:none;align-items:center;gap:2px;margin-left:auto}
.inv-fam-row:hover .inv-fam-acts{display:inline-flex}
.inv-fam-row:hover .inv-fam-c{display:none}
.inv-fam-act{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:none;background:none;border-radius:6px;color:var(--text-soft);cursor:pointer}
.inv-fam-act:hover{background:rgba(0,0,0,.08);color:var(--text)}
.inv-fam-row.on .inv-fam-act{color:rgba(255,255,255,.85)}
.inv-fam-row.on .inv-fam-act:hover{background:rgba(255,255,255,.2);color:#fff}
/* modo organizar: barra y selección */
.inv-bulk{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px;padding:11px 14px;background:var(--accent-soft,rgba(150,40,27,.08));border:1px solid var(--accent-line);border-radius:var(--r-md)}
.inv-bulk-n{font-size:13px;font-weight:800;color:var(--accent)}
.inv-bulk-lbl{font-size:12.5px;color:var(--text-soft)}
.inv-tile.selmode{cursor:pointer}
.inv-tile.selmode .inv-tile-eye{display:none}
.inv-tile-check{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:center;color:#fff}
.inv-tile.picked{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-line)}
.inv-tile.picked .inv-tile-check{background:var(--accent);border-color:var(--accent)}
/* foto del producto: tarjeta */
.inv-tile-img{width:62px;height:62px;border-radius:12px;overflow:hidden;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;margin-top:2px}
.inv-tile-img img{width:100%;height:100%;object-fit:cover}
.inv-tile.has-img{min-height:170px}
/* foto del producto: editor */
.ip-img-row{display:flex;align-items:center;gap:12px}
.ip-img-prev{position:relative;width:74px;height:74px;flex:0 0 auto;border:1px solid var(--border-soft);border-radius:var(--r-md);overflow:hidden;background:var(--bg-soft);display:flex;align-items:center;justify-content:center}
.ip-img-prev img{width:100%;height:100%;object-fit:cover}
.ip-img-empty .icon{width:26px;height:26px;color:var(--text-dim)}
.ip-img-x{position:absolute;top:3px;right:3px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ip-img-up{flex:0 0 auto;cursor:pointer}
/* modo Editar / Conteo */
.inv-mode-seg{flex:0 0 auto}
.inv-mode-seg .seg-b{display:inline-flex;align-items:center;gap:5px;padding:8px 13px}
.inv-mode-tag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--accent);background:var(--accent-soft,rgba(150,40,27,.08));border:1px solid var(--accent-line);border-radius:999px;padding:6px 13px;flex:0 0 auto}
/* arrastrar */
.inv-tile.drag{cursor:grab}
.inv-tile.drag:active{cursor:grabbing}
.inv-tile-grip{color:var(--text-dim);opacity:0;transition:opacity var(--t-fast);cursor:grab}
.inv-tile:hover .inv-tile-grip{opacity:.7}
.inv-fam-row.drop{background:var(--accent);color:#fff;outline:2px dashed rgba(255,255,255,.6);outline-offset:-3px}
.inv-fam-row.drop .inv-fam-c,.inv-fam-row.drop .inv-fam-lbl{color:#fff}
/* panel de conteo diario */
.cnt-now{text-align:center;padding:18px 14px;border:1px solid var(--border-soft);border-radius:var(--r-lg);background:var(--bg-soft);margin-bottom:18px}
.cnt-now.low{border-color:#f3c0c0;background:rgba(220,80,70,.06)}
.cnt-now-n{font-size:42px;font-weight:800;letter-spacing:-1.5px;line-height:1;color:var(--text)}
.cnt-now-n span{font-size:16px;font-weight:600;color:var(--text-soft);margin-left:5px}
.cnt-now.low .cnt-now-n{color:var(--danger)}
.cnt-now-l{font-size:12.5px;color:var(--text-soft);margin-top:8px}
.cnt-now-tags{font-size:11.5px;color:var(--text-dim);margin-top:5px}
.cnt-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cnt-btns .ibtn{justify-content:center;padding:12px}
/* reporte */
.rep-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.rep-kpi{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:12px 14px;text-align:center}
.rep-kpi-n{font-size:24px;font-weight:800;letter-spacing:-.5px}
.rep-kpi.alert .rep-kpi-n{color:var(--danger)}
.rep-kpi-l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;color:var(--text-soft);margin-top:4px}
.rep-wrap{max-height:54vh;overflow:auto;border:1px solid var(--border-soft);border-radius:var(--r-md)}
.rep-table{width:100%;border-collapse:collapse;font-size:12.5px}
.rep-table th{position:sticky;top:0;background:var(--bg-card);text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap;z-index:1}
.rep-table td{padding:9px 10px;border-bottom:1px solid var(--border-soft)}
.rep-table tr:last-child td{border-bottom:none}
.rep-name{font-weight:600}
.rep-num{text-align:right;white-space:nowrap}
.rep-table th.rep-num{text-align:right}
.rep-low{background:rgba(220,80,70,.05)}
/* movimientos (reporte) */
.mv-filters{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:14px}
.chip.sm{padding:5px 11px;font-size:12px}
.mv-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.mv-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.mv-kpi{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:8px;text-align:center}
.mv-kpi b{display:block;font-size:19px;font-weight:800}
.mv-kpi span{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);font-weight:700}
.mv-list{display:flex;flex-direction:column;gap:2px;max-height:46vh;overflow:auto}
.mv-item{display:flex;align-items:center;gap:11px;padding:9px 8px;border-bottom:1px solid var(--border-soft)}
.mv-item:last-child{border-bottom:none}
.mv-av{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.mv-main{flex:1;min-width:0}
.mv-l1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.mv-prod{font-size:13.5px;font-weight:700}
.mv-pill{font-size:10.5px;font-weight:700;padding:1px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
.mv-l2{font-size:12px;color:var(--text-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-qty{flex:0 0 auto;font-size:17px;font-weight:800;min-width:46px;text-align:right}
@media(max-width:980px){
  .inv-shell{flex-direction:column}
  .inv-side,.inv-edit{position:static;flex:none;width:100%;max-height:none}
  .inv-edit{order:-1}
  .inv-fam-list{max-height:240px}
  .inv-mode-seg{order:3}
}
/* ---- modal de producto: secciones + vista previa ---- */
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ip-sec{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin:6px 0 12px;padding-top:6px}
.ip-sec .icon{color:var(--accent)}
.ip-sec:not(:first-child){border-top:1px solid var(--border-soft);margin-top:4px;padding-top:16px}
.ip-hint{font-size:13px;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:11px 13px;margin-bottom:16px;line-height:1.5}
.ip-prev{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:6px 14px;margin-bottom:16px}
.ip-prev-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;color:var(--text-soft)}
.ip-prev-row+.ip-prev-row{border-top:1px solid var(--border-soft)}
.ip-prev-row b{color:var(--text);font-size:14.5px}
/* ---- factura ---- */
.fac-line{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:12px;margin-bottom:10px}
.fac-line-top{display:flex;gap:8px;align-items:center}
.fac-prod{flex:1;min-width:0}
.fac-del{width:40px;height:40px;flex:0 0 auto;border:1px solid var(--border)}
.fac-del:hover{border-color:var(--danger)}.fac-del:hover .icon{color:var(--danger)}
.fac-new{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;margin-top:9px}
.fac-line-nums{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin-top:9px}
.fac-num label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);margin-bottom:5px}
.fac-line-total{font-weight:800;font-size:15px;white-space:nowrap;padding-bottom:11px;min-width:64px;text-align:right;font-variant-numeric:tabular-nums}
.fac-total{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:14px 16px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-md);font-size:13px;font-weight:700;color:var(--text-soft)}
.fac-total b{font-size:20px;font-weight:800;color:var(--text)}
.fac-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:15px 16px;margin-bottom:11px;box-shadow:var(--e1)}
.fac-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.fac-card-sup{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fac-card-total{font-weight:800;font-size:17px;white-space:nowrap;font-variant-numeric:tabular-nums}
.fac-card-items{margin-top:11px;border-top:1px solid var(--border-soft);padding-top:11px;display:flex;flex-direction:column;gap:5px}
.fac-card-items>div{font-size:12.5px;color:var(--text-soft);display:flex;flex-wrap:wrap;gap:6px;align-items:baseline}
.fac-card-items>div span{color:var(--text);font-weight:600}
.fac-card-items>div b{color:var(--text)}
/* escaneo de factura con foto (acción principal) */
.fac-scan{margin-bottom:18px}
