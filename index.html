.fac-scan-btn{display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;width:100%;padding:26px 18px;border:2px dashed var(--accent-line);border-radius:var(--r-lg);background:var(--accent-soft);color:var(--text);transition:border-color var(--t-fast),transform var(--t-fast)}
.fac-scan-btn:hover{border-color:var(--accent)}
.fac-scan-btn:active{transform:scale(.99)}
.fac-scan-ico{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;background:var(--grad-accent);margin-bottom:8px}
.fac-scan-ico .icon{width:26px;height:26px;color:#fff}
.fac-scan-t{font-weight:800;font-size:16px}
.fac-scan-s{font-size:12.5px;color:var(--text-soft);max-width:34ch}
.fac-scan-status{font-size:12.5px;margin-top:11px;line-height:1.5;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;text-align:center}
.fac-scan-status:empty{display:none}
/* estado vacío de productos */
.fac-empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:3px;padding:22px 16px;border:1px dashed var(--border);border-radius:var(--r-md);color:var(--text-soft)}
.fac-empty .icon{width:30px;height:30px;color:var(--text-dim);margin-bottom:5px}
.fac-empty-t{font-weight:700;color:var(--text);font-size:14px}
.fac-empty-s{font-size:12.5px}
.fac-manual{margin-top:12px;display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1px solid var(--border);border-radius:var(--r-pill);background:var(--bg-soft);font-weight:600;font-size:13px;color:var(--text);transition:border-color var(--t-fast)}
.fac-manual:hover{border-color:var(--accent-line)}
.fac-ok{color:var(--success);font-weight:600}
.fac-err{color:var(--danger);font-weight:600}
.fac-spin{width:15px;height:15px;border:2px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:facspin .7s linear infinite;flex:0 0 auto}
@keyframes facspin{to{transform:rotate(360deg)}}
@media(max-width:780px){
  .inv-card{grid-template-columns:68px 1fr;gap:12px}
  .inv-actions{grid-column:1/-1;justify-content:flex-end;flex-wrap:wrap;border-top:1px solid var(--border-soft);padding-top:10px}
  .ibtn span{display:none}
  .ibtn{padding:10px 12px}
  .row3{grid-template-columns:1fr 1fr}
  .fac-new{grid-template-columns:1fr 1fr}
}
/* pizarra infinita (lienzo) */
.canvas-wrap{position:relative;overflow:auto;border:1px solid var(--border-soft);border-radius:var(--r-lg);background-color:var(--bg-elev);background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:24px 24px;height:calc(100vh - 330px);min-height:480px}
.canvas{position:relative}
.bcard{position:absolute;width:230px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:13px;box-shadow:var(--e2);cursor:grab;touch-action:none;user-select:none;transition:box-shadow var(--t-fast)}
.bcard:hover{transform:none;box-shadow:var(--e3)}
.bcard.note{background:linear-gradient(180deg,var(--warn-bg),transparent),var(--bg-card);border-color:var(--warn-bg)}
.bcard.dragging{z-index:60;box-shadow:var(--e3);cursor:grabbing;opacity:.97}
.bcard .bc-text{font-size:13px;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.bcard img{width:100%;border-radius:var(--r-md);margin-top:4px;pointer-events:none}
.bc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px}
.bc-meta{font-size:10.5px;color:var(--text-soft)}
.bc-btn{border:none;background:none;cursor:pointer}
.bc-del{position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:var(--r-sm);color:var(--text-soft);opacity:0;transition:opacity var(--t-fast),background var(--t-fast);display:flex;align-items:center;justify-content:center}
.bcard:hover .bc-del{opacity:1}
.bc-del:hover{background:var(--danger-bg);color:var(--danger)}
.bc-reply{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:4px 8px}
.bc-reply:hover{border-color:var(--accent-line);color:var(--accent)}
.swatch-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.swatch{width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer}
.swatch.on{border-color:var(--text)}
/* área de trabajo: lienzo + chat lateral */
.proj-work{display:flex;gap:14px;align-items:stretch}
.proj-work .canvas-wrap{flex:1;height:calc(100vh - 300px);min-height:600px}
.canvas-wrap.panning{cursor:grabbing}
.canvas-links{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
.canvas-draw{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
.canvas-wrap.drawing{cursor:crosshair}
.canvas-wrap.drawing .bcard{pointer-events:none}
.board-empty{position:absolute;top:40px;left:40px;display:flex;align-items:center;gap:11px;color:var(--text-soft);font-size:14px;max-width:380px;line-height:1.5;pointer-events:none}
.board-empty .icon{width:26px;height:26px;color:var(--text-dim);flex:0 0 auto}
/* barra de herramientas de la pizarra */
.board-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.bt-group,.bt-add{display:inline-flex;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;flex:0 0 auto;background:var(--bg-soft)}
.bt-tool,.bt-add button{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;background:transparent;color:var(--text-soft);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:background var(--t-fast),color var(--t-fast)}
.bt-tool+.bt-tool,.bt-add button+button{border-left:1px solid var(--border)}
.bt-tool.on{background:var(--accent);color:#fff}
.bt-add button:hover{background:var(--bg-elev);color:var(--text)}
.bt-icon{width:40px;height:40px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);color:var(--text-soft);cursor:pointer;transition:background var(--t-fast),color var(--t-fast),border-color var(--t-fast)}
.bt-icon:hover{background:var(--bg-elev);color:var(--text);border-color:var(--accent-line)}
.bt-icon:disabled{opacity:.4;cursor:default}
.bt-icon:disabled:hover{background:var(--bg-soft);color:var(--text-soft);border-color:var(--border)}
.bt-pens{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;padding:0 4px}
.pen-sw{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);transition:transform var(--t-fast),border-color var(--t-fast)}
.pen-sw.on{border-color:var(--text);transform:scale(1.12)}
.bt-widths{display:inline-flex;gap:4px;margin-left:2px}
.pen-w{width:30px;height:30px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg-soft);display:inline-flex;align-items:center;justify-content:center}
.pen-w.on{border-color:var(--accent);background:var(--accent-soft)}
.pen-w span{display:block;border-radius:50%;background:var(--text)}
/* tarjeta de archivo / PDF en la pizarra */
.file-card{width:230px}
.fc-card-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.fc-card-ic{width:40px;height:40px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent)}
.fc-card-ic .icon{width:21px;height:21px}
.fc-card-tx{min-width:0}
.fc-card-name{font-weight:700;font-size:13.5px;line-height:1.25;word-break:break-word}
.fc-card-sub{font-size:11.5px;color:var(--text-soft);margin-top:2px;word-break:break-word}
.fc-card-actions{display:flex;gap:6px;margin-bottom:9px}
.fc-card-actions .fc-act{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg-soft);font-size:11.5px;font-weight:700;color:var(--text)}
.fc-card-actions .fc-act:hover{border-color:var(--accent-line)}
.fc-chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:9px 12px;word-break:break-word}
.fc-detail{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.fc-detail .fc-card-ic{width:48px;height:48px}
/* chip de archivo en el chat */
.chat-file{display:flex;align-items:center;gap:8px;margin-top:6px;background:rgba(0,0,0,.18);border-radius:var(--r-md);padding:8px 10px}
.msg.mine .chat-file{background:rgba(255,255,255,.16)}
.chat-file-ic{width:30px;height:30px;flex:0 0 auto;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12)}
.chat-file-tx{min-width:0;flex:1}
.chat-file-n{font-size:12.5px;font-weight:700;word-break:break-word;line-height:1.2}
.chat-file-s{font-size:10.5px;opacity:.75;margin-top:1px}
.chat-file-b{width:30px;height:30px;flex:0 0 auto;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:inherit;cursor:pointer}
.chat-file-b:hover{background:rgba(255,255,255,.22)}
.canvas-zoom{position:relative}
.board-exit{position:absolute;top:12px;right:12px;z-index:95;flex:0 0 auto;box-shadow:var(--e2)}
.bcard{z-index:1}
.title-card{background:transparent!important;border:none!important;box-shadow:none!important;padding:6px 10px;width:auto;min-width:120px;max-width:340px}
.title-card .bc-title{font-size:22px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.title-card .bc-del{background:var(--bg-card)}
.reply{border-left:3px solid var(--accent-line)}
.reply-tag{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.proj-side{width:320px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;height:calc(100vh - 300px);min-height:600px}
.proj-side-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border-soft);background:var(--bg-elev)}
.proj-chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.proj-side .chat-input{padding:12px;border-top:1px solid var(--border-soft)}
/* ventana flotante de llamada (WebRTC) — vive fuera del render, seguís trabajando */
.call-dock{position:fixed;right:18px;bottom:18px;width:460px;height:340px;min-width:300px;min-height:210px;z-index:120;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--e3);overflow:hidden;resize:both}
.call-dock.hidden{display:none}
/* minimizado: píldora compacta, movible y con la reunión viva por debajo */
.call-dock.min{height:auto!important;width:auto!important;max-width:360px;min-width:0;min-height:0;resize:none;border-radius:var(--r-pill);border-color:transparent;box-shadow:var(--e2)}
.call-dock.min .ph-spacer{display:none}            /* sin estirar: la píldora se ajusta al contenido */
.call-dock.min .cd-title{flex:0 1 auto}            /* el nombre se ve completo y la píldora se ensancha si hace falta */
.call-dock.min .cd-body{display:none}
.cd-head{display:flex;align-items:center;gap:9px;padding:10px 10px 10px 14px;background:var(--bg-elev);border-bottom:1px solid var(--border-soft);cursor:grab;user-select:none;touch-action:none}
.cd-head:active{cursor:grabbing}
.call-dock.min .cd-head{border-bottom:none;background:var(--grad-accent);padding:7px 7px 7px 15px;gap:9px}
.call-dock.min .cd-title,.call-dock.min .cd-btn{color:#fff}
.call-dock.min .cd-title{font-size:13px;font-weight:750;letter-spacing:.2px}
.call-dock.min .cd-title>.icon{display:none}   /* en la píldora basta el punto "en vivo" */
.cd-live{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--danger);animation:cdpulse 1.7s infinite}
.call-dock.min .cd-live{width:9px;height:9px;background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.18)}
@keyframes cdpulse{0%{box-shadow:0 0 0 0 rgba(217,83,79,.55)}70%{box-shadow:0 0 0 7px rgba(217,83,79,0)}100%{box-shadow:0 0 0 0 rgba(217,83,79,0)}}
.cd-title{display:flex;align-items:center;gap:7px;flex:1;min-width:0;font-weight:700;font-size:13px}
.cd-title .icon{flex:0 0 auto}
#cdName{min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}   /* solo el nombre se acorta */
.cd-count{display:inline-flex;align-items:center;gap:3px;flex:0 0 auto;font-size:11.5px;font-weight:800;background:var(--accent-soft);color:#f0bcc5;border:1px solid var(--accent-line);border-radius:var(--r-pill);padding:1px 8px}
.cd-count .icon{width:12px;height:12px}
.call-dock.min .cd-count{background:rgba(255,255,255,.22);color:#fff;border-color:transparent}
.cd-btn{width:30px;height:30px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;border:none;background:rgba(255,255,255,.06);color:var(--text-soft);border-radius:9px;cursor:pointer;transition:background var(--t-fast),color var(--t-fast),transform var(--t-fast)}
.cd-btn:hover{color:var(--text);background:rgba(255,255,255,.16)}
.call-dock.min .cd-btn{width:29px;height:29px;border-radius:50%;background:rgba(255,255,255,.2)}
.call-dock.min .cd-btn:hover{background:rgba(255,255,255,.34)}
.call-dock.min .cd-btn.danger:hover{background:#fff;color:var(--accent-2)}
.cd-btn.danger:hover{background:var(--danger);color:#fff}
#cdMinBtn .icon{transition:transform var(--t-fast)}
.call-dock.min #cdMinBtn .icon{transform:rotate(180deg)}
.cd-body{flex:1;min-height:0;background:#000;position:relative}
.cd-body iframe{width:100%!important;height:100%!important;border:0;display:block}
.cd-load{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;color:var(--text-soft);font-size:13px;line-height:1.5}
@media(max-width:560px){ .call-dock{right:8px;left:8px;width:auto;bottom:78px;height:58vh} .call-dock.min{left:auto;right:8px;max-width:62vw} }
/* ===================== CALENDARIO ===================== */
.cal-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 12px}
.cal-today{flex:0 0 auto;padding:8px 16px}
.cal-nav{width:34px;height:34px}
.cal-next .icon{transform:scaleX(-1)}
.cal-title{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-left:6px;text-transform:capitalize}
.cal-views{display:inline-flex;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;flex:0 0 auto}
.cal-vbtn{padding:6px 13px;border:none;background:transparent;color:var(--text-soft);font-size:13px;font-weight:700;border-radius:calc(var(--r-md) - 4px);cursor:pointer;transition:background var(--t-fast),color var(--t-fast)}
.cal-vbtn.on{background:var(--grad-accent);color:#fff}
.cal-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.cal-fchip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--r-pill);background:var(--bg-soft);color:var(--text-soft);font-size:12.5px;font-weight:700;cursor:pointer;opacity:.5;transition:opacity var(--t-fast),border-color var(--t-fast)}
.cal-fchip.on{opacity:1;border-color:var(--accent-line);color:var(--text)}
.cal-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.cal-chip{display:flex;align-items:center;gap:5px;width:100%;text-align:left;font-size:11.5px;font-weight:600;line-height:1.3;padding:3px 8px;border:none;border-left:3px solid var(--c);border-radius:5px;background:var(--bg-soft);background:color-mix(in srgb, var(--c) 20%, var(--bg-soft));color:var(--text);cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-chip:hover{filter:brightness(1.15)}
.cal-chip b{font-weight:800;opacity:.9}
/* franja de atrasados */
.cal-overdue{background:var(--warn-bg);border:1px solid rgba(213,155,74,.4);border-radius:var(--r-md);padding:11px 14px;margin-bottom:12px}
.cal-od-h{font-size:13px;font-weight:800;color:var(--warn);display:flex;align-items:center;gap:7px;margin-bottom:8px}
.cal-od-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:6px 0;border-top:1px solid rgba(213,155,74,.18)}
.cal-od-t{font-weight:700;font-size:13.5px;cursor:pointer;min-width:0}
.cal-od-t:hover{text-decoration:underline}
.cal-od-d{font-size:12px;color:var(--text-soft)}
.cal-od-act{display:flex;gap:6px;margin-left:auto}
.cal-od-b{font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;transition:border-color var(--t-fast),background var(--t-fast)}
.cal-od-b:hover{border-color:var(--accent-line);background:var(--accent-soft)}
.cal-od-more{font-size:12px;color:var(--text-dim);padding-top:6px}
/* MES */
.cal-month{border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;background:var(--bg-card)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg-elev);border-bottom:1px solid var(--border-soft)}
.cal-dow span{padding:9px 8px;text-align:center;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(98px,1fr)}
.cal-cell{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:5px 5px 6px;display:flex;flex-direction:column;gap:3px;cursor:pointer;min-width:0;transition:background var(--t-fast)}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg-soft)}
.cal-cell.other{background:var(--bg-elev);opacity:.5}
.cal-cnum{font-size:12.5px;font-weight:700;color:var(--text-soft);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;align-self:flex-start}
.cal-cell.today .cal-cnum{background:var(--accent);color:#fff;font-weight:800}
.cal-cev{display:flex;flex-direction:column;gap:3px;min-width:0;overflow:hidden}
.cal-more{font-size:10.5px;font-weight:700;color:var(--text-dim);padding-left:3px}
/* TIME GRID (día / semana) */
.cal-timegrid{border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;background:var(--bg-card)}
.cal-tg-headrow{display:grid;background:var(--bg-elev);border-bottom:1px solid var(--border-soft)}
.cal-tg-dh{padding:8px 4px;text-align:center;border-left:1px solid var(--border-soft);display:flex;flex-direction:column;gap:1px}
.cal-tg-dh span{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim)}
.cal-tg-dh b{font-size:18px;font-weight:800;color:var(--text-soft);width:30px;height:30px;line-height:30px;border-radius:50%;margin:1px auto 0}
.cal-tg-dh.today b{background:var(--accent);color:#fff}
.cal-tg-adrow{display:grid;border-bottom:1px solid var(--border-soft);min-height:34px}
.cal-tg-adl{font-size:10px;font-weight:700;color:var(--text-dim);padding:7px 6px;display:flex;align-items:center;justify-content:flex-end;text-align:right}
.cal-tg-ad{border-left:1px solid var(--border-soft);padding:5px;display:flex;flex-direction:column;gap:3px;min-width:0}
.cal-tg-scroll{max-height:calc(100vh - 400px);min-height:320px;overflow-y:auto}
.cal-tg-board{display:grid;position:relative;padding-top:10px}
.cal-tg-gut{display:flex;flex-direction:column}
.cal-tg-hr{position:relative;border-bottom:1px solid var(--border-soft)}
.cal-tg-hr span{position:absolute;top:-8px;right:7px;font-size:10.5px;font-weight:600;color:var(--text-dim);background:var(--bg-card);padding:0 2px}
.cal-tg-col{position:relative;border-left:1px solid var(--border-soft);background:repeating-linear-gradient(var(--bg-card) 0 45px, var(--border-soft) 45px 46px);cursor:pointer}
.cal-ev{position:absolute;left:3px;right:3px;border:none;border-left:3px solid var(--c);border-radius:6px;background:color-mix(in srgb, var(--c) 26%, var(--bg-card));color:var(--text);font-size:11px;font-weight:600;line-height:1.25;padding:3px 6px;text-align:left;overflow:hidden;cursor:pointer;box-shadow:var(--e1)}
.cal-ev:hover{filter:brightness(1.15)}
.cal-ev b{font-weight:800;display:block;font-size:10px;opacity:.9}
/* AÑO */
.cal-year{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cal-ymonth{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:12px;cursor:pointer;text-align:left;transition:border-color var(--t-fast),transform var(--t-fast)}
.cal-ymonth:hover{border-color:var(--accent-line);transform:translateY(-2px)}
.cal-ymn{font-weight:800;font-size:14px;margin-bottom:8px;color:var(--accent)}
.cal-yhdr,.cal-yg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-yhdr span{text-align:center;font-size:9px;font-weight:700;color:var(--text-dim)}
.cal-yc{text-align:center;font-size:11px;color:var(--text-soft);padding:3px 0;border-radius:50%;position:relative}
.cal-yc.o{opacity:.28}
.cal-yc.t{background:var(--accent);color:#fff;font-weight:800}
.cal-yc.h:not(.t)::after{content:"";position:absolute;left:50%;bottom:1px;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
/* modal evento */
.cal-allday{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text-soft);padding:11px 0;cursor:pointer}
.cal-allday input{width:18px;height:18px;accent-color:var(--accent)}
.cal-colors{display:flex;gap:10px;flex-wrap:wrap}
.cal-colsw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform var(--t-fast)}
.cal-colsw.on{border-color:var(--text);transform:scale(1.12)}
.cal-wdrow{display:flex;gap:6px;flex-wrap:wrap}
.cal-wd{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--bg-soft);color:var(--text-soft);font-size:13px;font-weight:800;cursor:pointer;transition:background var(--t-fast),color var(--t-fast),border-color var(--t-fast)}
.cal-wd:hover{border-color:var(--accent-line)}
.cal-wd.on{background:var(--grad-accent);color:#fff;border-color:transparent}
.cal-wdpresets{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.cal-wdpreset{font-size:12px;font-weight:700;padding:6px 13px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--bg-soft);color:var(--text-soft);cursor:pointer;transition:border-color var(--t-fast),color var(--t-fast)}
.cal-wdpreset:hover{border-color:var(--accent-line);color:var(--text)}
/* arrastrar / soltar */
.cal-chip.cdraggable,.cal-ev.cdraggable{cursor:grab;touch-action:none}
.cal-chip.cdraggable:active,.cal-ev.cdraggable:active{cursor:grabbing}
.cal-cell.cdrop,.cal-tg-col.cdrop{background:var(--accent-soft)!important;box-shadow:inset 0 0 0 2px var(--accent-line)}
.cal-ghost{position:fixed;z-index:200;pointer-events:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:5px 11px;border-radius:var(--r-pill);box-shadow:var(--e2)}
/* AGENDA */
.cal-agenda{display:flex;flex-direction:column;gap:2px}
.cal-ag-day{display:flex;gap:14px;padding:12px 4px;border-bottom:1px solid var(--border-soft)}
.cal-ag-day.today{background:var(--accent-soft);border-radius:var(--r-md)}
.cal-ag-date{flex:0 0 52px;text-align:center}
.cal-ag-date b{display:block;font-size:22px;font-weight:800;line-height:1}
.cal-ag-date span{font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;line-height:1.2;display:inline-block;margin-top:3px}
.cal-ag-day.today .cal-ag-date b{color:var(--accent)}
.cal-ag-items{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.cal-ag-row{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:8px 12px;border:none;border-left:3px solid var(--c);border-radius:8px;background:var(--bg-soft);background:color-mix(in srgb, var(--c) 14%, var(--bg-soft));color:var(--text);cursor:pointer}
.cal-ag-row:hover{filter:brightness(1.12)}
.cal-ag-time{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--text-soft);min-width:96px}
.cal-ag-t{font-weight:600;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:780px){
  .cal-grid{grid-auto-rows:minmax(74px,1fr)}
  .cal-chip{font-size:10.5px;padding:2px 6px}
  .cal-title{font-size:16px;width:100%;order:5;margin:4px 0 0}
  .cal-views{order:6}
  .cal-year{grid-template-columns:repeat(2,1fr)}
  .cal-tg-scroll{max-height:calc(100vh - 330px)}
}
/* pantalla completa */
.proj-work:fullscreen{background:var(--bg);padding:14px;gap:14px}
.proj-work:fullscreen .canvas-wrap,.proj-work:fullscreen .proj-side{height:calc(100vh - 28px)}
.proj-work.faux-full{position:fixed;inset:0;z-index:80;background:var(--bg);padding:14px}
.proj-work.faux-full .canvas-wrap,.proj-work.faux-full .proj-side{height:calc(100vh - 28px)}
/* llamada */
.call-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.call-tile{position:relative;aspect-ratio:4/3;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;display:flex;align-items:center;justify-content:center}
.call-tile video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.call-tile .av{width:54px;height:54px;font-size:20px}
.call-name{position:absolute;bottom:6px;left:8px;font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.45);padding:2px 8px;border-radius:6px}
.call-tile.other{background:var(--bg-card)}
.call-nomedia{font-size:12px;color:var(--text-soft);padding:14px;text-align:center}
.proj-mtabs{display:none}
@media(max-width:780px){
  .proj-mtabs{display:flex;gap:8px;margin-bottom:12px}
  .pmt{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:1px solid var(--border);background:var(--bg-soft);border-radius:var(--r-md);font-weight:700;font-size:13px;color:var(--text-soft);transition:background var(--t-fast),color var(--t-fast),border-color var(--t-fast)}
  .pmt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pmt .icon{width:16px;height:16px}
  .board-hint{display:none}
  .proj-work{flex-direction:column;gap:0}
  .proj-work .canvas-wrap{flex:none;height:calc(100vh - 240px);min-height:0}
  .proj-side{width:100%;height:calc(100vh - 240px);min-height:0}
  /* en celular se muestra una sola cosa a la vez */
  .proj-work.pm-chat .canvas-wrap{display:none}
  .proj-work:not(.pm-chat) .proj-side{display:none}
  /* a pantalla completa siempre se ve la pizarra */
  .proj-work.faux-full{padding:10px}
  .proj-work.faux-full .canvas-wrap{display:block;height:calc(100vh - 20px)}
  .proj-work.faux-full .proj-side{display:none}
}
@media(max-width:880px) and (min-width:781px){
  .proj-work{flex-direction:column}
  .proj-work .canvas-wrap{height:60vh;min-height:0}
  .proj-side{width:100%;height:340px;min-height:0}
}
/* media en chat */
.msg img,.msg video{max-width:240px;max-height:280px;border-radius:10px;margin-top:5px;display:block;cursor:pointer}
.chat-attach{width:44px;height:44px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color var(--t-fast)}
.chat-attach:hover{border-color:var(--accent-line)}
.chat-pending{display:flex;gap:8px;align-items:center;padding:6px 12px;font-size:12px;color:var(--text-soft)}
.chat-pending img,.chat-pending video{width:40px;height:40px;object-fit:cover;border-radius:6px}

/* ---------- TABLE (admin) ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);font-weight:700;padding:11px;border-bottom:1px solid var(--border)}
.tbl td{padding:11px;border-bottom:1px solid var(--border-soft)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr{transition:background var(--t-fast)}
.tbl tbody tr:hover td{background:var(--bg-soft)}
.role-badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:var(--r-sm);background:var(--accent-soft);color:var(--accent)}
.stars{display:inline-flex;gap:1px}
.star{background:none;border:none;cursor:pointer;color:var(--text-dim);padding:1px;display:inline-flex}
.star.on{color:var(--warn)}
.star[disabled]{cursor:default}
.rv-table th,.rv-table td{white-space:nowrap}
.rv-table tbody tr:hover td{background:var(--bg-soft)}

/* ---------- SOUVENIRS ---------- */
.kpi.ok .value{color:var(--ok,#3a9d6e)}
.souv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:4px}
.souv-card{position:relative;background:var(--bg-card,var(--bg-soft));border:1px solid var(--border-soft);border-radius:var(--r-lg,16px);padding:20px 16px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;box-shadow:var(--e1);transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast)}
.souv-card:hover{transform:translateY(-3px);border-color:var(--accent-line);box-shadow:var(--e2)}
.souv-card.out{opacity:.6}
.souv-ic{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:var(--grad-accent,var(--accent));color:#fff;box-shadow:var(--e1)}
.souv-ic .icon{width:26px;height:26px}
.souv-name{font-weight:750;font-size:15px;line-height:1.25;letter-spacing:-.2px;min-height:2.4em;display:flex;align-items:center;justify-content:center}
.souv-price{display:flex;flex-direction:column;align-items:center;gap:1px;margin:2px 0}
.souv-price .sp-amt{font-weight:800;font-size:24px;line-height:1.05;letter-spacing:-.6px;color:var(--text);font-variant-numeric:tabular-nums}
.souv-price .sp-usd{font-size:12.5px;font-weight:650;color:var(--text-soft);font-variant-numeric:tabular-nums}
.souv-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.souv-stock{font-size:11px;font-weight:700;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-pill);padding:3px 11px;white-space:nowrap}
.souv-stock.low{color:var(--warn);background:var(--warn-bg);border-color:transparent}
.souv-stock.zero{color:var(--danger);background:var(--danger-bg);border-color:transparent}
.souv-gan{font-size:11px;font-weight:700;color:var(--success);background:var(--success-bg);border-radius:var(--r-pill);padding:3px 11px;white-space:nowrap}
.souv-sell-btn{width:100%;margin-top:6px}
.souv-sell-stock{font-size:15px;margin-bottom:12px;color:var(--text)}
.souv-sell-info{font-size:13px;color:var(--text-soft);margin-top:10px;padding:10px 12px;background:var(--bg-soft);border-radius:var(--r-md,12px)}
.cur-usd{color:var(--text-soft);font-weight:600}
.tbl .cur-usd{display:block;font-size:11px;margin-top:1px}
/* tipo de cambio */
.souv-fx{display:inline-flex;align-items:center;gap:3px;font-size:12.5px;font-weight:600;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:7px 11px;flex:0 0 auto}
.souv-fx-in{width:62px;border:none;background:transparent;color:var(--text);font-weight:800;font-size:14px;text-align:right;outline:none}
/* gráficos de gerencia */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chartcard{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--e1)}
.chart-title{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:16px}
.chart-title .icon{color:var(--accent)}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:140px}
.cbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;min-width:0}
.cbar-val{font-size:10px;font-weight:700;color:var(--text-soft);white-space:nowrap}
.cbar-track{width:100%;flex:1;display:flex;align-items:flex-end}
.cbar-fill{width:100%;min-height:3px;background:var(--accent-soft);border-radius:6px 6px 0 0;transition:height .4s var(--ease-out)}
.cbar-fill.today{background:var(--grad-accent)}
.cbar-lbl{font-size:10.5px;font-weight:600;color:var(--text-soft);text-transform:capitalize}
.chart-rows{display:flex;flex-direction:column;gap:12px}
.chart-row{display:flex;align-items:center;gap:10px;font-size:12.5px}
.cr-name{flex:0 0 32%;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-track{flex:1;height:10px;background:var(--bg-soft);border-radius:6px;overflow:hidden}
.cr-fill{height:100%;background:var(--grad-accent);border-radius:6px;transition:width .4s var(--ease-out)}
.cr-val{flex:0 0 auto;font-weight:800;font-variant-numeric:tabular-nums}
.chart-empty{font-size:12.5px;color:var(--text-soft);padding:12px 0}
/* modal de venta */
.souv-sellhead{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.souv-sellhead .souv-ic{width:48px;height:48px;flex:0 0 auto;border-radius:14px}
.souv-sellhead-n{font-weight:800;font-size:18px;line-height:1.15}
.qty-step{display:flex;align-items:center;gap:10px}
.qty-step button{width:48px;height:48px;flex:0 0 auto;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-size:24px;font-weight:800;color:var(--text);line-height:1;transition:border-color var(--t-fast)}
.qty-step button:hover{border-color:var(--accent-line)}
.qty-step input{flex:1;min-width:0;text-align:center;font-size:24px;font-weight:800;padding:11px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text)}
.souv-paycur{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:16px 0}
.souv-paycur>span{font-size:13px;font-weight:600;color:var(--text-soft)}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;flex:0 0 auto}
.seg-b{padding:9px 14px;font-size:13px;font-weight:700;color:var(--text-soft);background:transparent;transition:background var(--t-fast),color var(--t-fast)}
.seg-b.on{background:var(--accent);color:#fff}
.souv-total{text-align:center;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-md);padding:18px}
.souv-total-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;color:var(--text-soft)}
.souv-total-big{font-size:32px;font-weight:800;line-height:1.05;margin-top:5px;letter-spacing:-.5px}
.souv-total-sub{font-size:13.5px;color:var(--text-soft);margin-top:3px}
.souv-total-gan{font-size:13.5px;font-weight:700;color:var(--success);margin-top:10px}
.souv-sell-note{font-size:13px;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:12px 14px;text-align:center}
.souv-ganbox{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:4px 14px;margin:2px 0 16px}
.souv-ganbox-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--text-soft)}
.souv-ganbox-row+.souv-ganbox-row{border-top:1px solid var(--border-soft)}
.souv-ganbox-row b{color:var(--text);font-size:14px}
.souv-ganbox-row .cur-usd{font-size:11.5px}
@media(max-width:640px){ .souv-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px} .chart-grid{grid-template-columns:1fr} }

/* ---------- TOAST ---------- */
.toast-wrap{position:fixed;top:18px;right:18px;z-index:90;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:13px 17px;box-shadow:var(--e3);font-size:13px;font-weight:550;transform:translateX(120%);opacity:0;transition:transform var(--t-med) var(--ease-out),opacity var(--t-fast);max-width:330px}
.toast.show{transform:translateX(0);opacity:1}
.toast.ok{border-left-color:var(--success)}
.toast.err{border-left-color:var(--danger)}
/* Toast de notificación (rico, con icono + sonido) */
.toast-notif{display:flex;align-items:flex-start;gap:12px;padding:14px 14px 14px 15px;max-width:360px;width:360px;
  border-left:3px solid var(--accent);background:var(--bg-card);cursor:pointer;box-shadow:var(--e3);
  position:relative;overflow:hidden}
.toast-notif::after{content:"";position:absolute;left:0;bottom:0;height:3px;width:100%;background:var(--accent);
  transform-origin:left;animation:tnbar 6s linear forwards;opacity:.6}
@keyframes tnbar{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.toast-notif .tn-ico{flex:0 0 auto;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--accent-soft);color:var(--accent)}
.toast-notif .tn-ico .icon{width:20px;height:20px}
.toast-notif .tn-body{flex:1;min-width:0}
.toast-notif .tn-title{font-size:11px;font-weight:750;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:2px}
.toast-notif .tn-text{font-size:13.5px;font-weight:600;line-height:1.4;color:var(--text);word-break:break-word}
.toast-notif .tn-close{flex:0 0 auto;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--text-soft);background:transparent;border:none;cursor:pointer;transition:background var(--t-fast),color var(--t-fast);margin:-2px -2px 0 0}
.toast-notif .tn-close:hover{background:var(--bg-soft);color:var(--text)}
.toast-notif .tn-undo{flex:0 0 auto;align-self:center;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line);
  border-radius:var(--r-pill);padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.toast-notif .tn-undo:hover{background:var(--accent);color:#fff}
@media(max-width:780px){
  .toast-wrap{top:max(10px,env(safe-area-inset-top));left:10px;right:10px;align-items:stretch}
  .toast{max-width:100%}
  .toast-notif{width:auto;max-width:100%}
}

/* ---------- MEDIOS (carga diferida desde nodo aparte) ---------- */
img.media-loading,video.media-loading{min-width:120px;min-height:90px;border-radius:var(--r-md);
  background:linear-gradient(100deg,var(--bg-soft) 30%,var(--bg-elev) 50%,var(--bg-soft) 70%);
  background-size:200% 100%;animation:mediaShimmer 1.1s linear infinite}
@keyframes mediaShimmer{from{background-position:200% 0}to{background-position:-200% 0}}
img.media-broken,video.media-broken{min-width:120px;min-height:60px;animation:none;background:var(--bg-soft);
  position:relative}

/* ---------- BÚSQUEDA GLOBAL ---------- */
.gs-group{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);padding:14px 2px 6px}
.gs-row{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 11px;border-radius:var(--r-md);
  background:var(--bg-soft);border:1px solid var(--border-soft);margin-bottom:6px;transition:border-color var(--t-fast),transform var(--t-fast)}
.gs-row:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.gs-ico{flex:0 0 auto;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent)}
.gs-tx{min-width:0;display:flex;flex-direction:column;gap:1px}
.gs-t{font-weight:650;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gs-s{font-size:11.5px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-warn{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:650;color:var(--warn);background:var(--warn-bg);
  border-radius:var(--r-sm);padding:6px 9px;margin:8px 0 0}

/* ---------- NOTIF PANEL / USER MENU ---------- */
.notif-panel{position:absolute;top:58px;right:18px;width:344px;max-width:calc(100vw - 36px);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e3);z-index:40;max-height:70vh;overflow-y:auto;display:none}
.notif-panel.on{display:block;animation:pop .18s var(--ease-out) both}
.notif-head{padding:15px 17px;border-bottom:1px solid var(--border-soft);font-weight:750;display:flex;align-items:center}
.notif-item{padding:13px 17px;border-bottom:1px solid var(--border-soft);font-size:13px;display:flex;gap:11px;cursor:pointer;transition:background var(--t-fast)}
.notif-item:hover{background:var(--bg-soft)}
.notif-item.unread{background:var(--accent-soft)}
.notif-item .ni-ico{font-size:18px}
.notif-item .ni-t{font-weight:600;line-height:1.4}
.notif-item .ni-time{font-size:11px;color:var(--text-soft);margin-top:3px}
.user-menu{position:absolute;top:58px;right:18px;width:226px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e3);z-index:40;display:none;overflow:hidden}
.user-menu.on{display:block;animation:pop .18s var(--ease-out) both}
.um-item{display:flex;align-items:center;gap:11px;padding:12px 15px;font-size:13.5px;font-weight:550;width:100%;text-align:left;transition:background var(--t-fast)}
.um-item:hover{background:var(--bg-soft)}

/* ---------- RESPONSIVE ---------- */
@media(max-width:780px){
  .sidebar{display:none}
  .main{padding:16px 15px}
  .kpi-row{grid-template-columns:1fr 1fr;gap:11px}
  .kpi .value{font-size:24px}
  .row2{grid-template-columns:1fr}
  .detail-meta{grid-template-columns:1fr}
  .tb-user .nm,.tb-user .rl{display:none}
  .topbar{padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
  .suc-switch{padding:7px 9px}
  .page-title{font-size:20px}
  .bottom-nav{display:flex;flex-shrink:0;
    background:var(--bg-elev);
    border-top:1px solid var(--border-soft);padding:7px 4px calc(7px + env(safe-area-inset-bottom));justify-content:space-around}
  .bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;border-radius:var(--r-md);color:var(--text-soft);font-size:10.5px;font-weight:650;position:relative;flex:1;min-height:52px;transition:color var(--t-fast),background var(--t-fast)}
  .bn-item .ico .icon{width:23px;height:23px;transition:transform var(--t-fast)}
  .bn-item.active{color:var(--accent);background:var(--accent-soft)}
  .bn-item.active .ico .icon{transform:translateY(-1px) scale(1.06)}
  .bn-item:active{transform:scale(.93)}
  .bn-item .ncount{position:absolute;top:3px;right:20%;background:var(--danger);color:#fff;font-size:9px;font-weight:800;border-radius:9px;min-width:16px;height:16px;padding:0 4px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg-elev)}
  .chat-wrap{height:auto;border:none;border-radius:0;box-shadow:none}
  .chat-list{width:100%}
  .chat-list.hide-mobile{display:none}
  .chat-pane.hide-mobile{display:none}
  /* Mensajes en celular a pantalla completa (estilo WhatsApp): la conversación ocupa TODO */
  body.chat-open .topbar,body.chat-open .bottom-nav{display:none}
  body.chat-open .main{padding:0;display:flex;flex-direction:column;overflow:hidden}
  body.chat-open .view{flex:1;min-height:0;display:flex}
  body.chat-open .page-head,body.chat-open .section-guide{display:none}
  body.chat-open .chat-wrap{flex:1;min-height:0;height:auto;background:var(--bg)}
  body.chat-open .chat-head{padding-top:calc(13px + env(safe-area-inset-top))}
  body.chat-open .chat-input{padding-bottom:calc(13px + env(safe-area-inset-bottom))}
  /* en celular el chat usa todo el ancho: menos margen a los lados y burbujas más anchas */
  .chat-msgs{padding:10px 8px}
  .msg{max-width:90%}
  body.chat-open .chat-head{padding-left:11px;padding-right:11px}
  body.chat-open .chat-input{padding-left:9px;padding-right:9px}
  .board{justify-content:center}
  .bcard{width:100%;max-width:360px}
  .notif-panel,.user-menu{right:10px}
  .tbl-wrap{overflow-x:auto}
}
@media(max-width:780px){
  .main{padding:12px 12px}
  .view{max-width:100%}
  .page-title{font-size:18px}
  .kpi{padding:13px}
  .kpi .value{font-size:21px}
  .kpi-row{gap:9px}
  .sched-card .av{width:38px;height:38px}
  .proj-tab{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .toolbar{gap:7px}
  .modal{max-height:90vh}
  .bottom-nav .bn-item{font-size:9.5px}
}
/* ===== Mejoras de pop-ups, campos, horas y fechas ===== */
/* campos más grandes y cómodos */
.input,.select,.textarea{font-size:15px;padding:12px 13px;border-radius:var(--r-md)}
.field label{font-size:11.5px;margin-bottom:8px}
.field{margin-bottom:16px}
/* selects con flecha propia (más claros) */
.select{-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--text-soft) 50%),linear-gradient(135deg,var(--text-soft) 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px;cursor:pointer}
/* modal: animación más viva y centrado cómodo */
.modal-bg{align-items:center}
.modal{animation:pop .18s var(--ease-out) both;border-radius:18px}
.modal-head{padding:16px 20px}
.modal-head h3{font-size:17px}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;gap:10px}
.modal-foot .btn{padding:13px;font-size:15px}
/* En celular, los pop-ups suben desde abajo (estilo "hoja") = más cómodo para el pulgar */
@media(max-width:780px){
  .modal-bg{align-items:flex-end;padding:0}
  .modal,.modal.wide{max-width:100%;width:100%;max-height:92vh;border-radius:20px 20px 0 0;animation:sheetUp .24s var(--ease-out) both}
  .modal-foot{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* selector de hora grande y claro */
.tp{gap:4px;padding:6px 8px;border-radius:var(--r-md)}
.tp select{font-size:20px;padding:8px 4px;-webkit-appearance:none;appearance:none;background:none;cursor:pointer}
.tp-num{font-size:22px;padding:8px 3px;width:3ch;min-width:3ch;flex:0 0 auto}
.tp-colon{font-size:19px}
.tp-ampm{margin-left:5px;border-radius:9px}
.tp-ap{padding:10px 12px;font-size:13px}
.sh-pickwrap{gap:9px}
.sh-arrow{font-size:16px;color:var(--text-soft);text-align:center}
/* chips y botones con mejor área táctil */
.chip{padding:9px 14px}
.ap{padding:8px 12px}
@media(max-width:780px){
  /* en celular: pop-ups como hoja desde abajo (mucho más cómodo) */
  .modal-bg{align-items:flex-end;padding:0}
  .modal{max-width:100%;width:100%;max-height:92vh;border-radius:20px 20px 0 0;animation:sheetUp .26s var(--ease-out) both}
  .modal-head{position:sticky;top:0}
  .modal-foot{position:sticky;bottom:0;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  .modal::before{content:"";display:block;width:42px;height:4px;border-radius:3px;background:var(--border);margin:8px auto 0}
  .input,.select,.textarea{font-size:16px}
  .tp select{font-size:18px}
  .tp-num{font-size:22px}
  .row2{grid-template-columns:1fr}
  .tp-ap{padding:11px 14px}
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:781px){ .mobile-only{display:none!important} }
</style>
