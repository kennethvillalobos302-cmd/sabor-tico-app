<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#141010">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sabor Tico">
<title>Sabor Tico App</title>
<style>
/* =====================================================================
   SABOR TICO — sistema visual (redesign-preserve, principios taste/impeccable)
   Marca Helo: acento púrpura bloqueado · tipografía de sistema (feel nativo)
   ===================================================================== */
:root{
  /* radios — un solo sistema de forma */
  --r-lg:16px;   /* superficies grandes: paneles, modales, cards */
  --r-md:11px;   /* botones, inputs, chips */
  --r-sm:8px;    /* compactos */
  --r-pill:999px;
  /* easing + duraciones */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --t-fast:.14s; --t-med:.24s;
  /* espaciado base 4 */
  --sp:4px;
}
:root,:root[data-theme="dark"]{color-scheme:dark}
:root[data-theme="light"]{color-scheme:light}
:root[data-theme="dark"]{
  --bg:#141010;
  --bg-elev:#1b1514;
  --bg-card:#211917;
  --bg-soft:#2b211e;
  --bg-row:#2b211e00;
  --border:#3a2d29;
  --border-soft:#2a201d;
  --text:#f4efed;
  --text-soft:#b3a39d;
  --text-dim:#7e6f69;
  --accent:#b83a52;
  --accent-2:#8f2438;
  --accent-press:#7a1f30;
  --accent-soft:rgba(184,58,82,.16);
  --accent-line:rgba(184,58,82,.42);
  --success:#5aa777; --success-bg:rgba(90,167,119,.14);
  --danger:#d9534f;  --danger-bg:rgba(217,83,79,.15);
  --warn:#d59b4a;    --warn-bg:rgba(213,155,74,.15);
  --info:#7fa9b8;    --info-bg:rgba(127,169,184,.15);
  /* elevación — sombras neutras a oscuro */
  --e1:0 1px 2px rgba(0,0,0,.4);
  --e2:0 6px 18px -6px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.35);
  --e3:0 24px 60px -12px rgba(0,0,0,.7), 0 8px 24px rgba(0,0,0,.45);
  --ring:0 0 0 3px var(--accent-soft);
  --grad-accent:linear-gradient(135deg,#a83048,#7c1f33);
}
:root[data-theme="light"]{
  --bg:#f4f1ef;
  --bg-elev:#ffffff;
  --bg-card:#ffffff;
  --bg-soft:#efe8e5;
  --bg-row:#f3edea;
  --border:#e2d8d4;
  --border-soft:#ede6e2;
  --text:#241a18;
  --text-soft:#6b5d57;
  --text-dim:#9a8b84;
  --accent:#8f2438;
  --accent-2:#7c1f33;
  --accent-press:#6a1a2b;
  --accent-soft:rgba(143,36,56,.10);
  --accent-line:rgba(143,36,56,.30);
  --success:#3f7d57; --success-bg:rgba(63,125,87,.10);
  --danger:#c0392b;  --danger-bg:rgba(192,57,43,.10);
  --warn:#b3792b;    --warn-bg:rgba(179,121,43,.12);
  --info:#4a7c8c;    --info-bg:rgba(74,124,140,.12);
  /* elevación — sombra tintada fría sobre claro */
  --e1:0 1px 2px rgba(40,46,66,.07);
  --e2:0 8px 20px -8px rgba(40,46,66,.16), 0 2px 6px rgba(40,46,66,.07);
  --e3:0 24px 50px -14px rgba(40,46,66,.22), 0 8px 20px rgba(40,46,66,.10);
  --ring:0 0 0 3px var(--accent-soft);
  --grad-accent:linear-gradient(135deg,#7355ff,#6240ff);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text);
  font-size:14px; line-height:1.5; letter-spacing:.1px;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14px}
:focus-visible{outline:none;box-shadow:var(--ring);border-radius:var(--r-sm)}
::selection{background:var(--accent-soft)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-soft);border:2px solid var(--bg);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--border)}
.hidden{display:none!important}
/* iconos SVG (sin emojis) */
.icon{width:18px;height:18px;display:inline-block;vertical-align:-3px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.icon-sm{width:14px;height:14px;stroke-width:2.1}
.icon-lg{width:22px;height:22px}
.av .icon{stroke:#fff;width:17px;height:17px}

/* ---------- motion (motivado, con reduced-motion) ---------- */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(120%)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: no-preference){
  .view{animation:fadeUp .3s var(--ease-out) both}
  .tk,.kpi,.card,.bcard{animation:fadeUp .32s var(--ease-out) both}
  .tk:nth-child(2){animation-delay:.03s}.tk:nth-child(3){animation-delay:.06s}
  .tk:nth-child(4){animation-delay:.09s}.tk:nth-child(5){animation-delay:.12s}
  .kpi:nth-child(2){animation-delay:.04s}.kpi:nth-child(3){animation-delay:.08s}.kpi:nth-child(4){animation-delay:.12s}
  .modal{animation:pop .2s var(--ease-out) both}
}

/* ---------- LOGIN ---------- */
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(900px 480px at 50% -8%, var(--accent-soft), transparent 70%),
    radial-gradient(600px 400px at 100% 110%, var(--accent-soft), transparent 70%),
    var(--bg);
  z-index:50;padding:20px}
.login-card{width:100%;max-width:430px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:calc(var(--r-lg) + 6px);box-shadow:var(--e3);padding:30px 28px;animation:pop .35s var(--ease-out) both}
.login-logo{font-size:32px;font-weight:800;letter-spacing:-.8px;text-align:center}
.login-logo .dot{color:var(--accent)}
.login-tag{text-align:center;color:var(--text-soft);font-size:12px;margin-top:6px;margin-bottom:24px;
  text-transform:uppercase;letter-spacing:1.4px}
.login-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;color:var(--text-soft);margin-bottom:9px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:244px;overflow-y:auto;overflow-x:hidden;margin-bottom:18px;padding:2px;scrollbar-gutter:stable}
.user-pick{min-width:0}
.user-pick>div{min-width:0}
.user-pick .nm,.user-pick .rl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-pick{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r-md);
  background:var(--bg-soft);text-align:left;transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast)}
.user-pick:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.user-pick.sel{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent-line)}
.user-pick .nm{font-weight:650;font-size:13px}
.user-pick .rl{font-size:11px;color:var(--text-soft)}
.pin-row{display:flex;gap:8px;margin-bottom:16px;width:100%}
.pin-row input{flex:1 1 0;min-width:0;width:100%;padding:14px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);
  color:var(--text);text-align:center;letter-spacing:6px;font-size:18px;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.pin-row input::placeholder{letter-spacing:6px}
.pin-row input:focus{border-color:var(--accent);box-shadow:var(--ring)}
#loginArea{width:100%}
#loginBtn{width:100%;max-width:100%}
.btn{padding:12px 16px;border-radius:var(--r-md);font-weight:650;font-size:14px;letter-spacing:.2px;
  transition:transform var(--t-fast),background var(--t-fast),border-color var(--t-fast),filter var(--t-fast),box-shadow var(--t-fast)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-primary{background:var(--grad-accent);color:#fff;box-shadow:0 6px 16px -6px var(--accent-2)}
#loginBtn{width:100%}
.btn-primary:hover{filter:brightness(1.06);box-shadow:0 10px 22px -8px var(--accent-2)}
.btn-primary:active{background:var(--accent-press)}
.btn-ghost{background:var(--bg-soft);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent-line);background:var(--bg-elev)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.05)}
.login-hint{font-size:11.5px;color:var(--text-soft);text-align:center;margin-top:16px;line-height:1.6}
.suc-pick{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.suc-card{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-weight:650;font-size:15px;text-align:left;transition:border-color var(--t-fast),transform var(--t-fast)}
.suc-card:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.suc-card .icon{color:var(--accent)}
.login-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-soft);font-size:12.5px;font-weight:600;padding:4px 0;margin-bottom:10px;cursor:pointer}
.login-back:hover{color:var(--text)}

/* ---------- AVATAR ---------- */
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}

/* ---------- APP SHELL ---------- */
.app{display:none;height:100%;flex-direction:column}
.app.on{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border-soft);
  background:color-mix(in srgb,var(--bg-elev) 88%, transparent);backdrop-filter:blur(10px);flex-shrink:0;z-index:20}
.tb-logo{font-size:18px;font-weight:800;letter-spacing:-.4px;white-space:nowrap}
.tb-logo .dot{color:var(--accent)}
.cloud-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--success);background:var(--success-bg);padding:4px 9px;border-radius:var(--r-pill)}
.cloud-tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--success)}
@media(max-width:780px){ .cloud-tag{display:none} }
.suc-switch{display:flex;align-items:center;gap:6px;background:var(--bg-soft);border:1px solid var(--border);
  border-radius:var(--r-md);padding:7px 11px;font-size:13px;font-weight:650;transition:border-color var(--t-fast)}
.suc-switch:hover{border-color:var(--accent-line)}
.suc-switch select{background:transparent;border:none;color:var(--text);font-weight:650;outline:none;cursor:pointer}
.tb-spacer{flex:1}
.icon-btn{width:39px;height:39px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
  background:var(--bg-soft);border:1px solid var(--border);position:relative;font-size:18px;
  transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast)}
.icon-btn:hover{border-color:var(--accent-line);transform:translateY(-1px)}
.badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
  background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px var(--bg-elev)}
.tb-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:4px 9px 4px 4px;border-radius:var(--r-md);
  transition:background var(--t-fast)}
.tb-user:hover{background:var(--bg-soft)}
.tb-user .nm{font-size:13px;font-weight:650;line-height:1.15}
.tb-user .rl{font-size:11px;color:var(--text-soft)}

.body-wrap{display:flex;flex:1;min-height:0}
.sidebar{width:218px;border-right:1px solid var(--border-soft);background:var(--bg-elev);
  padding:14px 12px;overflow-y:auto;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-md);
  font-weight:550;font-size:14px;color:var(--text-soft);margin-bottom:2px;width:100%;text-align:left;position:relative;
  transition:background var(--t-fast),color var(--t-fast)}
.nav-item .ico{font-size:18px;width:22px;text-align:center;transition:transform var(--t-fast)}
.nav-item:hover{background:var(--bg-soft);color:var(--text)}
.nav-item:hover .ico{transform:scale(1.08)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-item .ncount{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:9px;
  min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nav-sep{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-dim);font-weight:700;padding:16px 12px 7px}

.main{flex:1;overflow-y:auto;padding:26px 28px;min-width:0}
.view{max-width:1120px;margin:0 auto}
.bottom-nav{display:none}

/* ---------- HEADINGS / SECTIONS ---------- */
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1.15}
.page-sub{color:var(--text-soft);font-size:13px;margin-top:3px}
.ph-spacer{flex:1}
.section-guide{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);margin-bottom:18px;overflow:hidden;box-shadow:var(--e1)}
.sg-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:13px 16px;font-size:14px;font-weight:650;color:var(--text);transition:background var(--t-fast)}
.sg-toggle:hover{background:var(--bg-soft)}
.sg-toggle .chev{margin-left:auto;transition:transform var(--t-med);color:var(--text-soft)}
.section-guide.open .chev{transform:rotate(180deg)}
.sg-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--t-med) var(--ease)}
.section-guide.open .sg-body{grid-template-rows:1fr}
.sg-inner{overflow:hidden;min-height:0}
.sg-inner>div{padding:2px 16px 16px;color:var(--text-soft);font-size:13px;line-height:1.65}
.sg-inner b{color:var(--text)}
.sg-inner ul{margin-top:8px}
.tip{background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-md);padding:10px 13px;margin-top:12px;font-size:12.5px;color:var(--text)}

/* ---------- KPI ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:17px 18px;
  box-shadow:var(--e1);transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast);position:relative;overflow:hidden}
.kpi:hover{transform:translateY(-2px);border-color:var(--border);box-shadow:var(--e2)}
.kpi .label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.1px;font-weight:700;color:var(--text-soft)}
.kpi .value{font-size:30px;font-weight:800;margin-top:8px;line-height:1;letter-spacing:-1px;
  font-variant-numeric:tabular-nums}
.kpi .sub{font-size:12px;color:var(--text-soft);margin-top:7px}
.kpi.alert .value{color:var(--danger)}
.kpi.good .value{color:var(--success)}
.kpi.warn .value{color:var(--warn)}

/* ---------- CARDS / LIST ---------- */
.card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:var(--e1)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.input,.select,.textarea{width:100%;padding:11px 13px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);
  color:var(--text);outline:none;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.input::placeholder,.textarea::placeholder{color:var(--text-dim)}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:var(--ring)}
.textarea{resize:vertical;min-height:84px;line-height:1.55}
.search{flex:1;min-width:160px}
.chip{padding:8px 13px;border-radius:var(--r-pill);background:var(--bg-soft);border:1px solid var(--border);
  font-size:12.5px;font-weight:650;color:var(--text-soft);white-space:nowrap;
  transition:border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.chip:hover{border-color:var(--accent-line);color:var(--text)}
.chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

.tk{display:flex;gap:13px;padding:15px;border:1px solid var(--border-soft);border-radius:var(--r-lg);background:var(--bg-card);
  margin-bottom:10px;align-items:flex-start;box-shadow:var(--e1);
  transition:border-color var(--t-fast),transform var(--t-fast),box-shadow var(--t-fast);cursor:pointer}
.tk:hover{border-color:var(--border);transform:translateY(-1px);box-shadow:var(--e2)}
.tk-main{flex:1;min-width:0}
.tk-title{font-weight:650;font-size:14.5px;margin-bottom:4px;letter-spacing:-.1px}
.tk-meta{font-size:12px;color:var(--text-soft);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tk-desc{font-size:13px;color:var(--text-soft);margin-top:7px;line-height:1.5}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);white-space:nowrap;display:inline-flex;align-items:center;gap:4px;letter-spacing:.2px}
.pill.pendiente{background:var(--bg-soft);color:var(--text-soft)}
.pill.proceso{background:var(--info-bg);color:var(--info)}
.pill.hecha{background:var(--success-bg);color:var(--success)}
.pill.rechazada{background:var(--danger-bg);color:var(--danger)}
.pill.atrasada{background:var(--warn-bg);color:var(--warn)}
.pr-alta{color:var(--danger)} .pr-media{color:var(--warn)} .pr-baja{color:var(--text-soft)}
.dot-prio{width:8px;height:8px;border-radius:50%;display:inline-block}

.empty{text-align:center;padding:52px 20px;color:var(--text-soft)}
.empty .em-ico{font-size:42px;margin-bottom:12px;opacity:.9}
.empty .em-t{font-size:16px;font-weight:700;color:var(--text);margin-bottom:7px;letter-spacing:-.2px}
.empty .em-d{font-size:13px;max-width:360px;margin:0 auto 18px;line-height:1.6}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(6,8,14,.72);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:calc(var(--r-lg) + 2px);box-shadow:var(--e3);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.modal.wide{max-width:760px}
.modal-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg-card);z-index:2}
.modal-head h3{font-size:18px;font-weight:750;letter-spacing:-.3px}
.modal-close{margin-left:auto;width:32px;height:32px;border-radius:var(--r-sm);font-size:20px;color:var(--text-soft);transition:background var(--t-fast),color var(--t-fast)}
.modal-close:hover{background:var(--bg-soft);color:var(--text)}
.modal-body{padding:22px}
.modal-foot{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--border-soft);position:sticky;bottom:0;background:var(--bg-card)}
.modal-foot .btn{flex:1}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);margin-bottom:7px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.assignee-pick{display:flex;flex-wrap:wrap;gap:7px}
.ap{display:flex;align-items:center;gap:6px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--r-pill);
  background:var(--bg-soft);font-size:12.5px;font-weight:600;transition:border-color var(--t-fast),background var(--t-fast),color var(--t-fast)}
.ap:hover{border-color:var(--accent-line)}
.ap.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.img-prev{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.img-prev img{width:66px;height:66px;object-fit:cover;border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer}
input[type=file]{font-size:12.5px;color:var(--text-soft)}
input[type=file]::file-selector-button{padding:8px 12px;margin-right:10px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--bg-soft);color:var(--text);font-weight:600;cursor:pointer;transition:border-color var(--t-fast)}
input[type=file]::file-selector-button:hover{border-color:var(--accent-line)}

/* ---------- DETAIL / COMMENTS ---------- */
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.dm{background:var(--bg-soft);border-radius:var(--r-md);padding:11px 13px}
.dm .dl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);font-weight:700}
.dm .dv{font-weight:650;margin-top:4px;font-size:13.5px}
.log{border-left:2px solid var(--border);padding-left:15px;margin-top:6px}
.log-item{position:relative;padding:8px 0;font-size:12.5px;color:var(--text-soft);line-height:1.5}
.log-item::before{content:'';position:absolute;left:-20px;top:13px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.log-item b{color:var(--text)}
.comment{display:flex;gap:9px;margin-bottom:11px}
.comment .cbody{background:var(--bg-soft);border-radius:var(--r-md);padding:9px 13px;flex:1}
.comment .cname{font-size:12px;font-weight:700}
.comment .ctext{font-size:13px;margin-top:3px;line-height:1.5}
.comment .ctime{font-size:10.5px;color:var(--text-soft);margin-top:4px}

/* ---------- CHAT ---------- */
.chat-wrap{display:flex;gap:0;height:calc(100vh - 150px);border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;background:var(--bg-card);box-shadow:var(--e1)}
.chat-list{width:288px;border-right:1px solid var(--border-soft);overflow-y:auto;flex-shrink:0}
.chat-li{display:flex;gap:11px;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background var(--t-fast)}
.chat-li:hover{background:var(--bg-soft)}
.chat-li.sel{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.chat-li .cn{font-weight:650;font-size:13.5px}
.chat-li .cp{font-size:11.5px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:172px}
.chat-li .cbadge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:9px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.chat-pane{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-head{padding:13px 17px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:11px;flex-shrink:0;background:var(--bg-elev)}
.chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:8px;
  background:radial-gradient(600px 300px at 100% 0%, var(--accent-soft), transparent 60%)}
.msg{max-width:74%;padding:9px 13px;border-radius:14px;font-size:13.5px;background:var(--bg-soft);align-self:flex-start;word-wrap:break-word;line-height:1.45;box-shadow:var(--e1)}
.msg.mine{background:var(--grad-accent);color:#fff;align-self:flex-end}
.msg .mname{font-size:11px;font-weight:700;opacity:.85;margin-bottom:2px}
.msg .mtime{font-size:10px;opacity:.7;margin-top:4px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:2px}
.msg-del{background:none;border:none;cursor:pointer;opacity:.55;padding:2px;color:inherit;display:inline-flex}
.msg-del:hover{opacity:1}
.msg-del .icon{width:13px;height:13px}
.chat-input{display:flex;gap:9px;padding:13px;border-top:1px solid var(--border-soft);flex-shrink:0;background:var(--bg-elev)}
.chat-input input{flex:1;padding:12px 15px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-pill);color:var(--text);outline:none;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.chat-input input:focus{border-color:var(--accent);box-shadow:var(--ring)}
.chat-send{width:45px;height:45px;border-radius:50%;background:var(--grad-accent);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--t-fast),filter var(--t-fast)}
.chat-send:hover{filter:brightness(1.07)}
.chat-send:active{transform:scale(.94)}
.admin-eye{font-size:11px;color:var(--warn);background:var(--warn-bg);padding:4px 9px;border-radius:var(--r-sm);font-weight:700}

/* ---------- BOARD (proyectos) ---------- */
.board{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.bcard{width:232px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:13px;position:relative;box-shadow:var(--e1);transition:transform var(--t-fast),box-shadow var(--t-fast)}
.bcard:hover{transform:translateY(-2px);box-shadow:var(--e2)}
.bcard.note{background:linear-gradient(180deg,var(--warn-bg),transparent),var(--bg-card);border-color:var(--warn-bg)}
.bcard .bc-text{font-size:13px;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.bcard img{width:100%;border-radius:var(--r-md);margin-top:4px}
.bcard .bc-meta{font-size:10.5px;color:var(--text-soft);margin-top:9px}
.bcard .bc-del{position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:var(--r-sm);font-size:14px;color:var(--text-soft);opacity:0;transition:opacity var(--t-fast),background var(--t-fast)}
.bcard:hover .bc-del{opacity:1}
.bcard .bc-del:hover{background:var(--danger-bg);color:var(--danger)}
.proj-tab{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.member-av{display:flex;align-items:center}
.member-av .av{width:29px;height:29px;font-size:11px;border:2px solid var(--bg-card);margin-left:-9px;box-shadow:none}
.member-av .av:first-child{margin-left:0}
/* horario en inicio */
.sched-card{display:flex;align-items:center;gap:14px}
.sched-card.free{opacity:.92}
.sched-card .av{width:42px;height:42px}
.sched-row{display:flex;gap:13px;padding:13px;border:1px solid var(--border-soft);border-radius:var(--r-md);background:var(--bg-soft);margin-bottom:8px;align-items:flex-start}
.sched-row.mine{border-color:var(--accent-line);background:var(--accent-soft)}
.sched-row .tk-main{flex:1;min-width:0}
/* modal de turno (fácil) */
.sh-times{display:flex;align-items:flex-end;gap:10px;margin-bottom:8px}
.sh-time{flex:1}
.sh-time label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:7px}
.sh-time input{font-size:19px;font-weight:700;text-align:center;padding:13px;width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text)}
.sh-time input:focus{border-color:var(--accent);box-shadow:var(--ring);outline:none}
.sh-arrow{text-align:center;color:var(--text-soft);font-size:16px;font-weight:700;line-height:1;margin:-2px 0}
/* atajos de turno */
.sh-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sh-preset{flex:1 1 calc(50% - 4px);min-width:118px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-weight:700;font-size:13px;color:var(--text);text-align:left;transition:border-color var(--t-fast),background var(--t-fast)}
.sh-preset span{font-size:11px;font-weight:600;color:var(--text-soft)}
.sh-preset:hover{border-color:var(--accent-line)}
.sh-preset.on{border-color:var(--accent);background:var(--accent-soft)}
.sh-preset.on,.sh-preset.on span{color:var(--accent)}
/* cabecera/edición de turnos rápidos */
.sh-presetbox{margin-bottom:12px}
.pe-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.pe-head>span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft)}
.pe-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent);background:transparent;padding:5px 9px;border-radius:var(--r-sm);transition:background var(--t-fast)}
.pe-link:hover{background:var(--accent-soft)}
.pe-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.pe-name{flex:0 0 112px;font-weight:700;padding:11px 12px}
.pe-times{flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 12px;min-width:0}
.pe-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft)}
.pe-times .tp{background:transparent;border:none;border-radius:0;padding:3px 0;flex-wrap:nowrap}
.pe-times .tp:focus-within{box-shadow:none}
.pe-times .tp-num{font-size:18px}
/* bloque de horas Entra/Sale */
.sh-block{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.sh-block .sh-row{display:flex;align-items:center;gap:10px;padding:8px 16px;min-height:58px}
.sh-block .sh-row+.sh-row{border-top:1px solid var(--border-soft)}
.sh-block .sh-row>label{flex:0 0 54px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);margin:0}
.sh-block .tp{flex:1;background:transparent;border:none;border-radius:0;justify-content:flex-end;padding:4px 0;flex-wrap:nowrap;gap:2px 6px}
.sh-block .tp:focus-within{box-shadow:none}
.sh-block .tp-ampm{margin-left:8px}
.sh-preview{margin:2px 0 4px}
.ap.shpreset{padding:9px 13px;font-weight:600}
.ap.shpreset.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.brk-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
/* selector de hora AM/PM */
.tp{display:inline-flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:3px 4px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);padding:6px 8px;overflow:visible;max-width:100%}
.tp select{background:transparent;border:none;color:var(--text);font-weight:800;font-size:19px;outline:none;cursor:pointer;padding:7px 2px;-webkit-appearance:none;appearance:none;text-align:center}
.tp-num{width:2.5ch;min-width:2.5ch;flex:0 0 auto;background:transparent;border:none;color:var(--text);font-weight:800;font-size:21px;outline:none;text-align:center;padding:6px 2px;caret-color:var(--accent)}
.tp-num::placeholder{color:var(--text-soft);opacity:.45}
.tp:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(184,58,82,.18)}
.tp .tp-colon{font-weight:800;color:var(--text-soft);font-size:18px;padding:0 1px}
.tp-ampm{display:inline-flex;flex:0 0 auto;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:4px}
.tp-ap{padding:8px 10px;font-size:12px;font-weight:700;color:var(--text-soft);background:transparent;border:none;cursor:pointer;transition:background var(--t-fast),color var(--t-fast)}
.tp-ap.on{background:var(--accent);color:#fff}
.sh-pickwrap{display:flex;flex-direction:column;align-items:stretch;gap:10px}
.sh-pickwrap .sh-time{display:flex;flex-direction:column;gap:7px}
.sh-pickwrap .tp{width:100%;justify-content:center}
.add-break{width:100%;border:1.5px dashed var(--border);background:transparent;border-radius:var(--r-md);padding:11px;font-weight:600;color:var(--text-soft);display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color var(--t-fast),color var(--t-fast)}
.add-break:hover{border-color:var(--accent);color:var(--accent)}
.btn-off{width:100%;border:1px solid var(--border);background:var(--bg-soft);border-radius:var(--r-md);padding:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color var(--t-fast)}
.btn-off:hover{border-color:var(--accent-line)}
/* calendario personalizado */
.datepick{position:relative}
.datepick-btn{display:flex;align-items:center;gap:8px;width:100%;cursor:pointer;text-align:left;font-weight:600}
.cal{position:absolute;z-index:5;top:calc(100% + 6px);left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--e3);padding:12px;animation:pop .15s var(--ease-out) both}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:700;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow div{text-align:center;font-size:10.5px;font-weight:700;color:var(--text-soft);padding:4px 0}
.cal-day{height:34px;border-radius:8px;font-size:13px;color:var(--text);background:transparent;border:none;cursor:pointer;transition:background var(--t-fast)}
.cal-day:hover{background:var(--bg-soft)}
.cal-day.today{box-shadow:inset 0 0 0 1px var(--accent-line)}
.cal-day.sel{background:var(--grad-accent);color:#fff;font-weight:700}
/* vista general de horarios (timeline) */
.hor-modes{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
/* ---- Horarios · Mi semana ---- */
.mw-sum{display:flex;align-items:center;gap:20px;background:var(--grad-accent);color:#fff;border-radius:var(--r-lg);padding:16px 22px;margin-bottom:14px;box-shadow:var(--e2)}
.mw-sum-cell{display:flex;flex-direction:column}
.mw-sum-big{font-size:24px;font-weight:800;line-height:1}
.mw-sum-lbl{font-size:11.5px;opacity:.88;margin-top:4px}
.mw-sum-div{width:1px;align-self:stretch;background:rgba(255,255,255,.28)}
.myweek{display:flex;flex-direction:column;gap:8px}
.mw-day{display:flex;gap:14px;padding:13px;border:1px solid var(--border-soft);border-radius:var(--r-md);background:var(--bg-card);align-items:flex-start;transition:border-color var(--t-fast) var(--ease)}
.mw-day.today{border-color:var(--accent-line);background:var(--accent-soft)}
.mw-day.isoff{opacity:.82}
.mw-date{flex:0 0 auto;width:54px;text-align:center;border-radius:var(--r-sm);background:var(--bg-soft);padding:9px 0;display:flex;flex-direction:column;gap:2px}
.mw-date.on{background:var(--grad-accent);color:#fff}
.mw-wd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft)}
.mw-date.on .mw-wd{color:rgba(255,255,255,.9)}
.mw-dn{font-size:21px;font-weight:800;line-height:1}
.mw-body{flex:1;min-width:0;padding-top:1px}
.mw-dayname{font-size:12px;font-weight:700;text-transform:capitalize;color:var(--text-soft);margin-bottom:6px}
.mw-shift+.mw-shift{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft)}
.mw-time{font-size:17px;font-weight:800;letter-spacing:.2px}
.mw-dash{color:var(--text-dim);font-weight:600;margin:0 2px}
.mw-meta{font-size:12px;color:var(--text-soft);margin-top:4px;display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center}
.mw-meta>span{display:inline-flex;align-items:center;gap:4px}
.mw-brks{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.mw-brk{font-size:11px;padding:3px 10px;border-radius:var(--r-pill);background:var(--bg-soft);color:var(--text-soft);display:inline-flex;align-items:center;gap:4px}
.mw-empty{font-size:13px;color:var(--text-dim);padding:5px 0}
.mw-pill.off{display:inline-block;font-size:12.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 14px;border-radius:var(--r-pill)}
/* ---- Horarios · Vista general (timeline) ---- */
.chip-dot{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin-left:6px;vertical-align:-3px;border-radius:var(--r-pill);background:var(--accent-soft);color:var(--accent);font-size:10.5px;font-weight:800}
.chip.on .chip-dot{background:rgba(255,255,255,.25);color:#fff}
.tl-summary{font-size:13px;color:var(--text-soft);margin-bottom:10px}
.tl-sum-num{font-weight:800;color:var(--text);font-size:15px}
.tl-wrap{overflow-x:auto;padding:16px}
.tl{min-width:600px}
.tl-axis{display:flex;margin-left:150px;height:20px;border-bottom:1px solid var(--border);margin-bottom:10px}
.tl-axis span{flex:1;font-size:10px;color:var(--text-soft);border-left:1px solid var(--border-soft);padding-left:4px}
.tl-dept{font-weight:800;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin:18px 0 8px}
.tl-row{display:flex;align-items:center;margin-bottom:8px}
.tl-name{width:150px;flex-shrink:0;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.tl-track{position:relative;flex:1;height:32px;background-color:var(--bg-soft);background-image:linear-gradient(90deg,var(--border) 0 1px,transparent 1px);background-size:var(--tl-step,9999px) 100%;border-radius:8px;overflow:hidden}
.tl-bar{position:absolute;top:3px;bottom:3px;background:var(--grad-accent);border-radius:6px;display:flex;align-items:center;min-width:3px;box-shadow:var(--e1);z-index:2}
.tl-lbl{font-size:10px;color:#fff;font-weight:700;padding:0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-brk{position:absolute;top:0;bottom:0;background:var(--bg);opacity:.5;border-left:1px dashed #fff;border-right:1px dashed #fff}
.tl-off{position:absolute;inset:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-soft);font-weight:600;border:1px dashed var(--border);border-radius:6px}
.tl-now{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:4;box-shadow:0 0 6px var(--accent)}
/* inventario rediseñado */
.inv-card{display:grid;grid-template-columns:96px 1fr auto;gap:16px;align-items:center;background:var(--bg-card);border:1px solid var(--border-soft);border-left:3px solid var(--success);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;box-shadow:var(--e1);transition:border-color var(--t-fast),transform var(--t-fast),box-shadow var(--t-fast)}
.inv-card:hover{transform:translateY(-1px);box-shadow:var(--e2)}
.inv-card.low{border-left-color:var(--danger)}
.inv-stock{text-align:center}
.inv-stock-n{font-size:23px;font-weight:800;line-height:1;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.inv-stock-n span{font-size:11px;font-weight:600;color:var(--text-soft);margin-left:3px}
.inv-bar{height:6px;background:var(--bg-soft);border-radius:4px;overflow:hidden;margin:7px 0 4px}
.inv-bar div{height:100%;background:var(--success);border-radius:4px;transition:width .4s var(--ease-out)}
.inv-card.low .inv-bar div{background:var(--danger)}
.inv-min{font-size:10.5px;color:var(--text-soft)}
.inv-info{min-width:0}
.inv-name{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:-.1px}
.inv-area{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);background:var(--bg-soft);padding:3px 7px;border-radius:6px}
.inv-meta{font-size:12.5px;color:var(--text-soft);margin-top:6px;line-height:1.5}
.inv-actions{display:flex;gap:6px;flex-shrink:0}
.ibtn{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-soft);font-size:12.5px;font-weight:600;color:var(--text);transition:border-color var(--t-fast),background var(--t-fast),transform var(--t-fast)}
.ibtn:hover{border-color:var(--accent-line)}
.ibtn:active{transform:scale(.97)}
.ibtn.ok:hover{border-color:var(--success)}
.ibtn .icon{color:var(--text-soft)}
.ibtn.ok .icon{color:var(--success)}
.ibtn.danger .icon{color:var(--danger)}
/* ---- modal de producto: secciones + vista previa ---- */
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ip-sec{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin:6px 0 12px;padding-top:6px}
.ip-sec .icon{color:var(--accent)}
.ip-sec:not(:first-child){border-top:1px solid var(--border-soft);margin-top:4px;padding-top:16px}
.ip-hint{font-size:13px;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:11px 13px;margin-bottom:16px;line-height:1.5}
.ip-prev{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:6px 14px;margin-bottom:16px}
.ip-prev-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;color:var(--text-soft)}
.ip-prev-row+.ip-prev-row{border-top:1px solid var(--border-soft)}
.ip-prev-row b{color:var(--text);font-size:14.5px}
/* ---- factura ---- */
.fac-line{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:12px;margin-bottom:10px}
.fac-line-top{display:flex;gap:8px;align-items:center}
.fac-prod{flex:1;min-width:0}
.fac-del{width:40px;height:40px;flex:0 0 auto;border:1px solid var(--border)}
.fac-del:hover{border-color:var(--danger)}.fac-del:hover .icon{color:var(--danger)}
.fac-new{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;margin-top:9px}
.fac-line-nums{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin-top:9px}
.fac-num label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);margin-bottom:5px}
.fac-line-total{font-weight:800;font-size:15px;white-space:nowrap;padding-bottom:11px;min-width:64px;text-align:right;font-variant-numeric:tabular-nums}
.fac-total{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:14px 16px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-md);font-size:13px;font-weight:700;color:var(--text-soft)}
.fac-total b{font-size:20px;font-weight:800;color:var(--text)}
.fac-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:15px 16px;margin-bottom:11px;box-shadow:var(--e1)}
.fac-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.fac-card-sup{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fac-card-total{font-weight:800;font-size:17px;white-space:nowrap;font-variant-numeric:tabular-nums}
.fac-card-items{margin-top:11px;border-top:1px solid var(--border-soft);padding-top:11px;display:flex;flex-direction:column;gap:5px}
.fac-card-items>div{font-size:12.5px;color:var(--text-soft);display:flex;flex-wrap:wrap;gap:6px;align-items:baseline}
.fac-card-items>div span{color:var(--text);font-weight:600}
.fac-card-items>div b{color:var(--text)}
@media(max-width:780px){
  .inv-card{grid-template-columns:68px 1fr;gap:12px}
  .inv-actions{grid-column:1/-1;justify-content:flex-end;flex-wrap:wrap;border-top:1px solid var(--border-soft);padding-top:10px}
  .ibtn span{display:none}
  .ibtn{padding:10px 12px}
  .row3{grid-template-columns:1fr 1fr}
  .fac-new{grid-template-columns:1fr 1fr}
}
/* pizarra infinita (lienzo) */
.canvas-wrap{position:relative;overflow:auto;border:1px solid var(--border-soft);border-radius:var(--r-lg);background-color:var(--bg-elev);background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:24px 24px;height:calc(100vh - 330px);min-height:480px}
.canvas{position:relative}
.bcard{position:absolute;width:230px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:13px;box-shadow:var(--e2);cursor:grab;touch-action:none;user-select:none;transition:box-shadow var(--t-fast)}
.bcard:hover{transform:none;box-shadow:var(--e3)}
.bcard.note{background:linear-gradient(180deg,var(--warn-bg),transparent),var(--bg-card);border-color:var(--warn-bg)}
.bcard.dragging{z-index:60;box-shadow:var(--e3);cursor:grabbing;opacity:.97}
.bcard .bc-text{font-size:13px;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.bcard img{width:100%;border-radius:var(--r-md);margin-top:4px;pointer-events:none}
.bc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px}
.bc-meta{font-size:10.5px;color:var(--text-soft)}
.bc-btn{border:none;background:none;cursor:pointer}
.bc-del{position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:var(--r-sm);color:var(--text-soft);opacity:0;transition:opacity var(--t-fast),background var(--t-fast);display:flex;align-items:center;justify-content:center}
.bcard:hover .bc-del{opacity:1}
.bc-del:hover{background:var(--danger-bg);color:var(--danger)}
.bc-reply{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text-soft);background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:4px 8px}
.bc-reply:hover{border-color:var(--accent-line);color:var(--accent)}
.swatch-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.swatch{width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer}
.swatch.on{border-color:var(--text)}
/* área de trabajo: lienzo + chat lateral */
.proj-work{display:flex;gap:14px;align-items:stretch}
.proj-work .canvas-wrap{flex:1;height:calc(100vh - 300px);min-height:600px}
.canvas-wrap.panning{cursor:grabbing}
.canvas-links{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
.canvas-zoom{position:relative}
.board-exit{position:absolute;top:12px;right:12px;z-index:95;flex:0 0 auto;box-shadow:var(--e2)}
.bcard{z-index:1}
.title-card{background:transparent!important;border:none!important;box-shadow:none!important;padding:6px 10px;width:auto;min-width:120px;max-width:340px}
.title-card .bc-title{font-size:22px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.title-card .bc-del{background:var(--bg-card)}
.reply{border-left:3px solid var(--accent-line)}
.reply-tag{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.proj-side{width:320px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;height:calc(100vh - 360px);min-height:460px}
.proj-side-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border-soft);background:var(--bg-elev)}
.proj-chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.proj-side .chat-input{padding:12px;border-top:1px solid var(--border-soft)}
/* pantalla completa */
.proj-work:fullscreen{background:var(--bg);padding:14px;gap:14px}
.proj-work:fullscreen .canvas-wrap,.proj-work:fullscreen .proj-side{height:calc(100vh - 28px)}
.proj-work.faux-full{position:fixed;inset:0;z-index:80;background:var(--bg);padding:14px}
.proj-work.faux-full .canvas-wrap,.proj-work.faux-full .proj-side{height:calc(100vh - 28px)}
/* llamada */
.call-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.call-tile{position:relative;aspect-ratio:4/3;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;display:flex;align-items:center;justify-content:center}
.call-tile video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.call-tile .av{width:54px;height:54px;font-size:20px}
.call-name{position:absolute;bottom:6px;left:8px;font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.45);padding:2px 8px;border-radius:6px}
.call-tile.other{background:var(--bg-card)}
.call-nomedia{font-size:12px;color:var(--text-soft);padding:14px;text-align:center}
.proj-mtabs{display:none}
@media(max-width:780px){
  .proj-mtabs{display:flex;gap:8px;margin-bottom:12px}
  .pmt{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:1px solid var(--border);background:var(--bg-soft);border-radius:var(--r-md);font-weight:700;font-size:13px;color:var(--text-soft);transition:background var(--t-fast),color var(--t-fast),border-color var(--t-fast)}
  .pmt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pmt .icon{width:16px;height:16px}
  .board-hint{display:none}
  .proj-work{flex-direction:column;gap:0}
  .proj-work .canvas-wrap{flex:none;height:calc(100vh - 240px);min-height:0}
  .proj-side{width:100%;height:calc(100vh - 240px);min-height:0}
  /* en celular se muestra una sola cosa a la vez */
  .proj-work.pm-chat .canvas-wrap{display:none}
  .proj-work:not(.pm-chat) .proj-side{display:none}
  /* a pantalla completa siempre se ve la pizarra */
  .proj-work.faux-full{padding:10px}
  .proj-work.faux-full .canvas-wrap{display:block;height:calc(100vh - 20px)}
  .proj-work.faux-full .proj-side{display:none}
}
@media(max-width:880px) and (min-width:781px){
  .proj-work{flex-direction:column}
  .proj-work .canvas-wrap{height:60vh;min-height:0}
  .proj-side{width:100%;height:340px;min-height:0}
}
/* media en chat */
.msg img,.msg video{max-width:240px;max-height:280px;border-radius:10px;margin-top:5px;display:block;cursor:pointer}
.chat-attach{width:44px;height:44px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color var(--t-fast)}
.chat-attach:hover{border-color:var(--accent-line)}
.chat-pending{display:flex;gap:8px;align-items:center;padding:6px 12px;font-size:12px;color:var(--text-soft)}
.chat-pending img,.chat-pending video{width:40px;height:40px;object-fit:cover;border-radius:6px}

/* ---------- TABLE (admin) ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);font-weight:700;padding:11px;border-bottom:1px solid var(--border)}
.tbl td{padding:11px;border-bottom:1px solid var(--border-soft)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr{transition:background var(--t-fast)}
.tbl tbody tr:hover td{background:var(--bg-soft)}
.role-badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:var(--r-sm);background:var(--accent-soft);color:var(--accent)}
.stars{display:inline-flex;gap:1px}
.star{background:none;border:none;cursor:pointer;color:var(--text-dim);padding:1px;display:inline-flex}
.star.on{color:var(--warn)}
.star[disabled]{cursor:default}
.rv-table th,.rv-table td{white-space:nowrap}
.rv-table tbody tr:hover td{background:var(--bg-soft)}

/* ---------- SOUVENIRS ---------- */
.kpi.ok .value{color:var(--ok,#3a9d6e)}
.souv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-top:4px}
.souv-card{background:var(--bg-card,var(--bg-soft));border:1px solid var(--border);border-radius:var(--r-lg,16px);padding:18px 16px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast)}
.souv-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--shadow-md,0 6px 20px rgba(0,0,0,.12))}
.souv-card.out{opacity:.55}
.souv-ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--grad-accent,var(--accent));color:#fff}
.souv-ic .icon{width:24px;height:24px}
.souv-name{font-weight:700;font-size:15px;line-height:1.2}
.souv-stock{font-size:13px;font-weight:600;color:var(--text-soft)}
.souv-stock.low{color:var(--warn)}
.souv-stock.zero{color:var(--text-dim)}
.souv-sell-btn{width:100%;margin-top:4px}
.souv-sell-stock{font-size:15px;margin-bottom:12px;color:var(--text)}
.souv-sell-info{font-size:13px;color:var(--text-soft);margin-top:10px;padding:10px 12px;background:var(--bg-soft);border-radius:var(--r-md,12px)}
@media(max-width:640px){ .souv-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px} }

/* ---------- TOAST ---------- */
.toast-wrap{position:fixed;top:18px;right:18px;z-index:90;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:13px 17px;box-shadow:var(--e3);font-size:13px;font-weight:550;transform:translateX(120%);opacity:0;transition:transform var(--t-med) var(--ease-out),opacity var(--t-fast);max-width:330px}
.toast.show{transform:translateX(0);opacity:1}
.toast.ok{border-left-color:var(--success)}
.toast.err{border-left-color:var(--danger)}

/* ---------- NOTIF PANEL / USER MENU ---------- */
.notif-panel{position:absolute;top:58px;right:18px;width:344px;max-width:calc(100vw - 36px);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e3);z-index:40;max-height:70vh;overflow-y:auto;display:none}
.notif-panel.on{display:block;animation:pop .18s var(--ease-out) both}
.notif-head{padding:15px 17px;border-bottom:1px solid var(--border-soft);font-weight:750;display:flex;align-items:center}
.notif-item{padding:13px 17px;border-bottom:1px solid var(--border-soft);font-size:13px;display:flex;gap:11px;cursor:pointer;transition:background var(--t-fast)}
.notif-item:hover{background:var(--bg-soft)}
.notif-item.unread{background:var(--accent-soft)}
.notif-item .ni-ico{font-size:18px}
.notif-item .ni-t{font-weight:600;line-height:1.4}
.notif-item .ni-time{font-size:11px;color:var(--text-soft);margin-top:3px}
.user-menu{position:absolute;top:58px;right:18px;width:226px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e3);z-index:40;display:none;overflow:hidden}
.user-menu.on{display:block;animation:pop .18s var(--ease-out) both}
.um-item{display:flex;align-items:center;gap:11px;padding:12px 15px;font-size:13.5px;font-weight:550;width:100%;text-align:left;transition:background var(--t-fast)}
.um-item:hover{background:var(--bg-soft)}

}
/* ===== Mejoras de pop-ups, campos, horas y fechas ===== */
/* campos más grandes y cómodos */
.input,.select,.textarea{font-size:15px;padding:12px 13px;border-radius:var(--r-md)}
.field label{font-size:11.5px;margin-bottom:8px}
.field{margin-bottom:16px}
/* selects con flecha propia (más claros) */
.select{-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--text-soft) 50%),linear-gradient(135deg,var(--text-soft) 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px;cursor:pointer}
/* modal: animación más viva y centrado cómodo */
.modal-bg{align-items:center}
.modal{animation:pop .18s var(--ease-out) both;border-radius:18px}
.modal-head{padding:16px 20px}
.modal-head h3{font-size:17px}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;gap:10px}
.modal-foot .btn{padding:13px;font-size:15px}
/* selector de hora grande y claro */
.tp{gap:4px;padding:6px 8px;border-radius:var(--r-md)}
.tp select{font-size:20px;padding:8px 4px;-webkit-appearance:none;appearance:none;background:none;cursor:pointer}
.tp-num{font-size:22px;padding:8px 3px;width:3ch;min-width:3ch;flex:0 0 auto}
.tp-colon{font-size:19px}
.tp-ampm{margin-left:5px;border-radius:9px}
.tp-ap{padding:10px 12px;font-size:13px}
.sh-pickwrap{gap:9px}
.sh-arrow{font-size:16px;color:var(--text-soft);text-align:center}
/* chips y botones con mejor área táctil */
.chip{padding:9px 14px}
.ap{padding:8px 12px}
@media(max-width:780px){
  /* en celular: pop-ups como hoja desde abajo (mucho más cómodo) */
  .modal-bg{align-items:flex-end;padding:0}
  .modal{max-width:100%;width:100%;max-height:92vh;border-radius:20px 20px 0 0;animation:sheetUp .26s var(--ease-out) both}
  .modal-head{position:sticky;top:0}
  .modal-foot{position:sticky;bottom:0;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  .modal::before{content:"";display:block;width:42px;height:4px;border-radius:3px;background:var(--border);margin:8px auto 0}
  .input,.select,.textarea{font-size:16px}
  .tp select{font-size:18px}
  .tp-num{font-size:22px}
  .row2{grid-template-columns:1fr}
  .tp-ap{padding:11px 14px}
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:781px){ .mobile-only{display:none!important} }
